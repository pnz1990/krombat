apiVersion: apps/v1
kind: Deployment
metadata:
  name: function-server
  namespace: rpg-system
  labels:
    app: function-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: function-server
  template:
    metadata:
      labels:
        app: function-server
    spec:
      containers:
        - name: function-server
          image: 569190534191.dkr.ecr.us-west-2.amazonaws.com/krombat/function-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: function-server
  namespace: rpg-system
spec:
  selector:
    app: function-server
  ports:
    - port: 8080
      targetPort: 8080
