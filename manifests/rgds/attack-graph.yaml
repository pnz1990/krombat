apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: attack-graph
spec:
  schema:
    apiVersion: v1alpha1
    kind: Attack
    group: game.k8s.example
    spec:
      dungeonName: string | required=true
      dungeonNamespace: string | default="default"
      target: string | required=true
      damage: integer | default=0
      seq: integer | default=0
      targetRoom: integer | default=0
    status:
      state: "ready"

  # No resources — this RGD exists only to define the Attack CRD.
  # Combat logic is computed by dungeon-graph CEL reading the Attack CR
  # via externalRef. The backend Go controller applies the result to
  # the Dungeon CR spec. No Job, no bash, no kubectl from within the cluster.
  resources: []
