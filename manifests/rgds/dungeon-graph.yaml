apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: dungeon-graph
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: Dungeon
    group: game.k8s.example
    spec:
      monsters: integer | default=3 minimum=1 maximum=10
      difficulty: string | default="normal" enum=easy,normal,hard
      monsterHP: "[]integer"
      bossHP: integer | default=0
      heroHP: integer | default=100
      heroClass: string | default="warrior" enum=warrior,mage,rogue
      heroMana: integer | default=0
      tauntActive: integer | default=0
      backstabCooldown: integer | default=0
      modifier: string | default="none"
      inventory: string | default=""
      weaponBonus: integer | default=0
      weaponUses: integer | default=0
      armorBonus: integer | default=0
      shieldBonus: integer | default=0
      helmetBonus: integer | default=0
      pantsBonus: integer | default=0
      bootsBonus: integer | default=0
      ringBonus: integer | default=0
      amuletBonus: integer | default=0
      poisonTurns: integer | default=0
      burnTurns: integer | default=0
      stunTurns: integer | default=0
      treasureOpened: integer | default=0
      currentRoom: integer | default=1
      doorUnlocked: integer | default=0
      room2MonsterHP: "[]integer"
      room2BossHP: integer | default=0
      lastHeroAction: string | default=""
      lastEnemyAction: string | default=""
      lastCombatLog: string | default=""
      lastLootDrop: string | default=""
      attackSeq: integer | default=0
      actionSeq: integer | default=0
      dotProcessedSeq: integer | default=0
      tauntProcessedSeq: integer | default=0
      cooldownProcessedSeq: integer | default=0
      ringProcessedSeq: integer | default=0
      lastAttackTarget: string | default=""
      lastAttackSeed: string | default=""
      lastAttackIndex: integer | default=-1
      lastAttackIsBoss: boolean | default=false
      lastAttackIsBackstab: boolean | default=false
      combatProcessedSeq: integer | default=0
      lastAction: string | default=""
      actionProcessedSeq: integer | default=0
      room2ProcessedSeq: integer | default=0
      lastAbility: string | default=""
      abilityProcessedSeq: integer | default=0
      runCount: integer | default=0
      monsterTypes: "[]string"
      initProcessedSeq: integer | default=0
    status:
      livingMonsters: "${size(monsterCRs.filter(m, m.status.?entityState.orValue('alive') == 'alive'))}"
      bossState: "${bossCR.status.?entityState.orValue('pending')}"
      bossPhase: "${bossCR.status.?phase.orValue('phase1')}"
      bossDamageMultiplier: "${bossCR.status.?damageMultiplier.orValue('10')}"
      bossSpecialAttackChance: "${bossCR.status.?specialAttackChance.orValue('20')}"
      victory: "${bossCR.status.?entityState.orValue('pending') == 'defeated'}"
      defeat: "${heroCR.status.?entityState.orValue('alive') == 'defeated'}"
      loot: "${treasureCR.status.?loot.orValue('')}"
      treasureState: "${treasureCR.status.?treasureState.orValue('unopened')}"
      modifier: "${modifierCR.status.?effect.orValue('No modifier')}"
      modifierType: "${modifierCR.status.?modifierType.orValue('none')}"
      maxHeroHP: "${heroCR.status.?maxHP.orValue('100')}"
      maxHeroMana: "${gameConfig.data.heroMana}"
      maxMonsterHP: "${gameConfig.data.maxMonsterHP}"
      maxBossHP: "${gameConfig.data.maxBossHP}"
      diceFormula: "${gameConfig.data.diceFormula}"
      monsterCounter: "${gameConfig.data.monsterCounter}"
      bossCounter: "${gameConfig.data.bossCounter}"

  resources:
    # --- Namespace per dungeon ---
    - id: ns
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.metadata.name}
          labels:
            game.k8s.example/dungeon: ${schema.metadata.name}

    # --- Hero CR ---
    - id: heroCR
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Hero
        metadata:
          name: "${schema.metadata.name + '-hero'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          hp: ${schema.spec.heroHP}
          difficulty: ${schema.spec.difficulty}
          heroClass: ${schema.spec.heroClass}
          mana: ${schema.spec.heroMana}

    # --- Monster CRs ---
    - id: monsterCRs
      forEach:
        - idx: "${has(schema.spec.monsterHP) ? lists.range(size(schema.spec.monsterHP)) : []}"
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Monster
        metadata:
          name: "${schema.metadata.name + '-monster-' + string(idx)}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          index: ${idx}
          hp: ${schema.spec.monsterHP[idx]}
          difficulty: ${schema.spec.difficulty}

    # --- Boss CR ---
    - id: bossCR
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Boss
        metadata:
          name: "${schema.metadata.name + '-boss'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          hp: ${schema.spec.bossHP}
          maxHP: "${schema.spec.difficulty == 'easy' ? 200 : schema.spec.difficulty == 'hard' ? 800 : 400}"
          difficulty: ${schema.spec.difficulty}
          monstersAlive: "${has(schema.spec.monsterHP) ? size(schema.spec.monsterHP.filter(hp, hp > 0)) : 0}"

    # --- Treasure CR ---
    - id: treasureCR
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Treasure
        metadata:
          name: "${schema.metadata.name + '-treasure'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          opened: ${schema.spec.treasureOpened}

    # --- Modifier CR (conditional) ---
    - id: modifierCR
      includeWhen:
        - ${schema.spec.modifier != "none"}
      readyWhen:
        - "${modifierCR.status.?modifierType.orValue('') != ''}"
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Modifier
        metadata:
          name: "${schema.metadata.name + '-modifier'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          modifierType: ${schema.spec.modifier}

    # --- Game config ---
    - id: gameConfig
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${schema.metadata.name + '-config'}"
          namespace: ${ns.metadata.name}
        data:
          maxMonsterHP: "${schema.spec.difficulty == 'easy' ? '30' : schema.spec.difficulty == 'hard' ? '80' : '50'}"
          maxBossHP: "${schema.spec.difficulty == 'easy' ? '200' : schema.spec.difficulty == 'hard' ? '800' : '400'}"
          diceFormula: "${schema.spec.difficulty == 'easy' ? '1d20+3' : schema.spec.difficulty == 'hard' ? '3d20+8' : '2d12+6'}"
          monsterCounter: "${schema.spec.difficulty == 'easy' ? '1' : schema.spec.difficulty == 'hard' ? '3' : '2'}"
          bossCounter: "${schema.spec.difficulty == 'easy' ? '3' : schema.spec.difficulty == 'hard' ? '8' : '5'}"

    # ===================================================================
    # dungeonInit: compute all starting game state from player choices.
    # Gate: initProcessedSeq == 0 (fires exactly once at creation).
    # Backend writes only: monsters, difficulty, heroClass, runCount,
    # and optional NG+ gear carry-overs. kro computes everything else.
    # ===================================================================
    - id: dungeonInit
      type: specPatch
      includeWhen:
        - "${schema.spec.initProcessedSeq == 0}"
      patch:
        # --- Hero HP by class, scaled by New Game+ runCount (+10% per run compounded) ---
        heroHP: >-
          ${cel.bind(base, schema.spec.heroClass == 'warrior' ? 200 : schema.spec.heroClass == 'mage' ? 120 : schema.spec.heroClass == 'rogue' ? 150 : 100,
          cel.bind(rc, schema.spec.runCount > 20 ? 20 : (schema.spec.runCount < 0 ? 0 : schema.spec.runCount),
          cel.bind(s1, rc >= 1 ? base * 110 / 100 : base,
          cel.bind(s2, rc >= 2 ? s1 * 110 / 100 : s1,
          cel.bind(s3, rc >= 3 ? s2 * 110 / 100 : s2,
          cel.bind(s4, rc >= 4 ? s3 * 110 / 100 : s3,
          cel.bind(s5, rc >= 5 ? s4 * 110 / 100 : s4,
          cel.bind(s6, rc >= 6 ? s5 * 110 / 100 : s5,
          cel.bind(s7, rc >= 7 ? s6 * 110 / 100 : s6,
          cel.bind(s8, rc >= 8 ? s7 * 110 / 100 : s7,
          cel.bind(s9, rc >= 9 ? s8 * 110 / 100 : s8,
          cel.bind(s10, rc >= 10 ? s9 * 110 / 100 : s9,
          rc > 10 ? s10 * (rc == 11 ? 110 : rc == 12 ? 121 : rc == 13 ? 133 : rc == 14 ? 146 : rc == 15 ? 161 : rc == 16 ? 177 : rc == 17 ? 195 : rc == 18 ? 214 : rc == 19 ? 236 : 259) / 100 : s10
          ))))))))))))}

        # --- Hero mana by class ---
        heroMana: >-
          ${schema.spec.heroClass == 'mage' ? 8 : 0}

        # --- Monster HP array: base by difficulty, curse-fortitude +50%, NG+ scale ---
        monsterHP: >-
          ${cel.bind(diff, schema.spec.difficulty,
          cel.bind(base, diff == 'easy' ? 30 : diff == 'hard' ? 80 : 50,
          cel.bind(rc, schema.spec.runCount > 20 ? 20 : (schema.spec.runCount < 0 ? 0 : schema.spec.runCount),
          cel.bind(alpha, 'abcdefghijklmnopqrstuvwxyz0123456789',
          cel.bind(name, schema.metadata.name,
          cel.bind(modIdx, alpha.indexOf(random.seededString(1, name + '-mod')) % 10,
          cel.bind(mod, modIdx == 0 ? 'none' : modIdx == 1 ? 'curse-fortitude' : modIdx == 2 ? 'curse-fury' : modIdx == 3 ? 'curse-darkness' : modIdx == 4 ? 'blessing-strength' : modIdx == 5 ? 'blessing-resilience' : modIdx == 6 ? 'blessing-fortune' : modIdx == 7 ? 'blessing-strength' : modIdx == 8 ? 'curse-fury' : 'blessing-fortune',
          cel.bind(fortified, mod == 'curse-fortitude' ? base * 3 / 2 : base,
          cel.bind(sc1, rc >= 1 ? fortified * 125 / 100 : fortified,
          cel.bind(sc2, rc >= 2 ? sc1 * 125 / 100 : sc1,
          cel.bind(sc3, rc >= 3 ? sc2 * 125 / 100 : sc2,
          cel.bind(sc4, rc >= 4 ? sc3 * 125 / 100 : sc3,
          cel.bind(sc5, rc >= 5 ? sc4 * 125 / 100 : sc4,
          cel.bind(sc6, rc >= 6 ? sc5 * 125 / 100 : sc5,
          cel.bind(sc7, rc >= 7 ? sc6 * 125 / 100 : sc6,
          cel.bind(sc8, rc >= 8 ? sc7 * 125 / 100 : sc7,
          cel.bind(sc9, rc >= 9 ? sc8 * 125 / 100 : sc8,
          cel.bind(sc10, rc >= 10 ? sc9 * 125 / 100 : sc9,
          cel.bind(mhp, rc > 10 ? sc10 * (rc == 11 ? 125 : rc == 12 ? 156 : rc == 13 ? 195 : rc == 14 ? 244 : rc == 15 ? 305 : rc == 16 ? 381 : rc == 17 ? 476 : rc == 18 ? 596 : rc == 19 ? 745 : 931) / 100 : sc10,
          lists.range(schema.spec.monsters).map(i, mhp)
          )))))))))))))))))))}

        # --- Boss HP: base by difficulty, NG+ scaled ---
        bossHP: >-
          ${cel.bind(diff, schema.spec.difficulty,
          cel.bind(base, diff == 'easy' ? 200 : diff == 'hard' ? 800 : 400,
          cel.bind(rc, schema.spec.runCount > 20 ? 20 : (schema.spec.runCount < 0 ? 0 : schema.spec.runCount),
          cel.bind(sc1, rc >= 1 ? base * 125 / 100 : base,
          cel.bind(sc2, rc >= 2 ? sc1 * 125 / 100 : sc1,
          cel.bind(sc3, rc >= 3 ? sc2 * 125 / 100 : sc2,
          cel.bind(sc4, rc >= 4 ? sc3 * 125 / 100 : sc3,
          cel.bind(sc5, rc >= 5 ? sc4 * 125 / 100 : sc4,
          cel.bind(sc6, rc >= 6 ? sc5 * 125 / 100 : sc5,
          cel.bind(sc7, rc >= 7 ? sc6 * 125 / 100 : sc6,
          cel.bind(sc8, rc >= 8 ? sc7 * 125 / 100 : sc7,
          cel.bind(sc9, rc >= 9 ? sc8 * 125 / 100 : sc8,
          cel.bind(sc10, rc >= 10 ? sc9 * 125 / 100 : sc9,
          rc > 10 ? sc10 * (rc == 11 ? 125 : rc == 12 ? 156 : rc == 13 ? 195 : rc == 14 ? 244 : rc == 15 ? 305 : rc == 16 ? 381 : rc == 17 ? 476 : rc == 18 ? 596 : rc == 19 ? 745 : 931) / 100 : sc10
          )))))))))))))}

        # --- Modifier: deterministic from dungeon name via seeded random ---
        modifier: >-
          ${cel.bind(alpha, 'abcdefghijklmnopqrstuvwxyz0123456789',
          cel.bind(name, schema.metadata.name,
          cel.bind(modIdx, alpha.indexOf(random.seededString(1, name + '-mod')) % 10,
          modIdx == 0 ? 'none' : modIdx == 1 ? 'curse-fortitude' : modIdx == 2 ? 'curse-fury' : modIdx == 3 ? 'curse-darkness' : modIdx == 4 ? 'blessing-strength' : modIdx == 5 ? 'blessing-resilience' : modIdx == 6 ? 'blessing-fortune' : modIdx == 7 ? 'blessing-strength' : modIdx == 8 ? 'curse-fury' : 'blessing-fortune'
          )))}

        # --- Monster types: goblin(0), skeleton(1), archer(even>=2), shaman(odd>=3) ---
        monsterTypes: >-
          ${lists.range(schema.spec.monsters).map(i, i == 0 ? 'goblin' : i == 1 ? 'skeleton' : i % 2 == 0 ? 'archer' : 'shaman')}

        # --- Sentinel: mark init complete ---
        initProcessedSeq: "${1}"

    - id: abilityResolve
      type: specPatch
      includeWhen:
        - "${schema.spec.attackSeq > schema.spec.abilityProcessedSeq && schema.spec.lastAbility != ''}"
      patch:
        # Mage heal: min(heroHP + 40, 120); warrior taunt: no change
        heroHP: >-
          ${schema.spec.lastAbility == 'mage-heal'
            ? (schema.spec.heroHP + 40 > 120 ? 120 : schema.spec.heroHP + 40)
            : schema.spec.heroHP}
        # Mage heal: heroMana - 2; warrior taunt: no change
        heroMana: >-
          ${schema.spec.lastAbility == 'mage-heal'
            ? schema.spec.heroMana - 2
            : schema.spec.heroMana}
        # Warrior taunt: activate (set to 1); mage heal: no change
        tauntActive: >-
          ${schema.spec.lastAbility == 'warrior-taunt'
            ? 1
            : schema.spec.tauntActive}
        # Warrior taunt: pre-arm tauntProcessedSeq so advanceTaunt doesn't fire this turn
        tauntProcessedSeq: >-
          ${schema.spec.lastAbility == 'warrior-taunt'
            ? schema.spec.attackSeq
            : schema.spec.tauntProcessedSeq}
        # Clear trigger and advance sentinel
        abilityProcessedSeq: "${schema.spec.attackSeq}"
        lastAbility: "${''}"

     # --- DoT tick: decrement poison/burn/stun and apply HP damage, once per attack turn ---
     # Gate: attackSeq has advanced past dotProcessedSeq AND combatResolve has fired first
     # (dotProcessedSeq < combatProcessedSeq prevents firing the same reconcile cycle that
     # applied the DoT via counter-attack, which would give an extra tick)
     # AND at least one DoT is active
     # AND lastAttackTarget is empty (combatResolve already ran and cleared the target)
     # AND lastAbility is empty.
    - id: tickDoT
      type: specPatch
      includeWhen:
        - "${schema.spec.attackSeq > schema.spec.dotProcessedSeq && schema.spec.dotProcessedSeq < schema.spec.combatProcessedSeq && (schema.spec.poisonTurns > 0 || schema.spec.burnTurns > 0 || schema.spec.stunTurns > 0) && schema.spec.lastAttackTarget == '' && schema.spec.lastAbility == ''}"
      patch:
        heroHP: "${schema.spec.heroHP - (schema.spec.poisonTurns > 0 ? 5 : 0) - (schema.spec.burnTurns > 0 ? 8 : 0) < 0 ? 0 : schema.spec.heroHP - (schema.spec.poisonTurns > 0 ? 5 : 0) - (schema.spec.burnTurns > 0 ? 8 : 0)}"
        poisonTurns: "${schema.spec.poisonTurns > 0 ? schema.spec.poisonTurns - 1 : 0}"
        burnTurns: "${schema.spec.burnTurns > 0 ? schema.spec.burnTurns - 1 : 0}"
        stunTurns: "${schema.spec.stunTurns > 0 ? schema.spec.stunTurns - 1 : 0}"
        dotProcessedSeq: "${schema.spec.attackSeq}"

    # --- Taunt advancement: 1→2 (protecting) → 0 (expired), once per attack turn ---
    # Gate: attackSeq has advanced past tauntProcessedSeq AND taunt is active (> 0)
    # AND lastAttackTarget is empty (combatResolve handles taunt when it fires)
    # AND lastAbility is empty (abilityResolve handles taunt activation).
    - id: advanceTaunt
      type: specPatch
      includeWhen:
        - "${schema.spec.attackSeq > schema.spec.tauntProcessedSeq && schema.spec.tauntActive > 0 && schema.spec.lastAttackTarget == '' && schema.spec.lastAbility == ''}"
      patch:
        tauntActive: "${schema.spec.tauntActive == 1 ? 2 : 0}"
        tauntProcessedSeq: "${schema.spec.attackSeq}"

    # --- Backstab cooldown tick: decrement once per attack or action turn ---
    # Gate: sum of both seqs has advanced past cooldownProcessedSeq AND cooldown > 0
    # AND lastAttackTarget is empty (combatResolve handles cooldown when it fires)
    # AND lastAbility is empty (abilityResolve already ran or this isn't an ability turn).
    - id: tickCooldown
      type: specPatch
      includeWhen:
        - "${schema.spec.attackSeq + schema.spec.actionSeq > schema.spec.cooldownProcessedSeq && schema.spec.backstabCooldown > 0 && schema.spec.lastAttackTarget == '' && schema.spec.lastAbility == ''}"
      patch:
        backstabCooldown: "${schema.spec.backstabCooldown - 1}"
        cooldownProcessedSeq: "${schema.spec.attackSeq + schema.spec.actionSeq}"

    # --- Ring HP regen: restore ringBonus HP per attack turn, capped at class max ---
    # Gate: attackSeq has advanced past ringProcessedSeq AND ringBonus is active
    # AND lastAttackTarget is empty (combatResolve handles ring regen when it fires)
    # AND lastAbility is empty (abilityResolve already ran or this isn't an ability turn).
    - id: regenRing
      type: specPatch
      includeWhen:
        - "${schema.spec.attackSeq > schema.spec.ringProcessedSeq && schema.spec.ringBonus > 0 && schema.spec.lastAttackTarget == '' && schema.spec.lastAbility == ''}"
      patch:
        heroHP: "${(schema.spec.heroHP + schema.spec.ringBonus) > (schema.spec.heroClass == 'warrior' ? 200 : schema.spec.heroClass == 'mage' ? 120 : schema.spec.heroClass == 'rogue' ? 150 : 100) ? (schema.spec.heroClass == 'warrior' ? 200 : schema.spec.heroClass == 'mage' ? 120 : schema.spec.heroClass == 'rogue' ? 150 : 100) : (schema.spec.heroHP + schema.spec.ringBonus)}"
        ringProcessedSeq: "${schema.spec.attackSeq}"

    # --- Combat resolution: compute all combat math in one atomic specPatch ---
    # Gate: attackSeq has advanced past combatProcessedSeq AND there's a target.
    # This replaces the Go backend's processCombat function.
    # Uses cel.bind() for intermediate values and kro CEL extensions for RNG + arrays.
    - id: combatResolve
      type: specPatch
      includeWhen:
        - "${schema.spec.attackSeq > schema.spec.combatProcessedSeq && schema.spec.lastAttackTarget != ''}"
      patch:
        # --- Monster HP: apply hero damage + shaman heal ---
        monsterHP: >-
          ${!schema.spec.lastAttackIsBoss && schema.spec.lastAttackIndex >= 0 ?
            cel.bind(s, schema.spec.lastAttackSeed,
            cel.bind(diff, schema.spec.difficulty,
            cel.bind(baseDmg,
              diff == 'easy' ? random.seededInt(0, 20, s + '-d1') + 3
              : diff == 'hard' ? random.seededInt(0, 20, s + '-d1') + random.seededInt(0, 20, s + '-d2') + random.seededInt(0, 20, s + '-d3') + 8
              : random.seededInt(0, 12, s + '-d1') + random.seededInt(0, 12, s + '-d2') + 6,
            cel.bind(classMult,
              schema.spec.lastAttackIsBackstab ? baseDmg * 3
              : schema.spec.heroClass == 'mage' ? (schema.spec.heroMana > 0 ? baseDmg * 13 / 10 : baseDmg / 2)
              : schema.spec.heroClass == 'rogue' ? baseDmg * 11 / 10
              : baseDmg,
            cel.bind(modMult,
              schema.spec.modifier == 'curse-darkness' ? classMult * 3 / 4
              : schema.spec.modifier == 'blessing-strength' ? classMult * 3 / 2
              : schema.spec.modifier == 'blessing-fortune' && random.seededInt(0, 100, s + '-crit') < 20 ? classMult * 2
              : classMult,
            cel.bind(wpnDmg, schema.spec.weaponUses > 0 ? modMult + schema.spec.weaponBonus : modMult,
            cel.bind(helmDmg, schema.spec.helmetBonus > 0 && random.seededInt(0, 100, s + '-helmet-crit') < schema.spec.helmetBonus ? wpnDmg * 2 : wpnDmg,
            cel.bind(amuDmg, schema.spec.amuletBonus > 0 ? helmDmg * (100 + schema.spec.amuletBonus) / 100 : helmDmg,
            cel.bind(finalDmg, schema.spec.stunTurns > 0 ? 0 : amuDmg,
            cel.bind(idx, schema.spec.lastAttackIndex,
            cel.bind(oldHP, schema.spec.monsterHP[idx],
            cel.bind(newHP, oldHP - finalDmg < 0 ? 0 : oldHP - finalDmg,
            cel.bind(postArr, lists.set(schema.spec.monsterHP, idx, newHP),
            cel.bind(postAlive, postArr.filter(h, h > 0).size(),
              postAlive > 0 ?
                cel.bind(shamans, lists.range(size(schema.spec.monsterHP)).filter(i,
                  schema.spec.monsterHP[i] > 0
                  && i < size(schema.spec.monsterTypes)
                  && schema.spec.monsterTypes[i] == 'shaman'
                  && random.seededInt(0, 100, s + '-shaman' + string(i) + '-heal') < 30),
                  size(shamans) > 0 ?
                    cel.bind(healTargets, lists.range(size(postArr)).filter(j,
                      postArr[j] > 0
                      && j < size(schema.spec.monsterTypes)
                      && schema.spec.monsterTypes[j] != 'shaman'),
                      size(healTargets) > 0 ?
                        cel.bind(hj, healTargets[0],
                        cel.bind(monMaxHP,
                          (diff == 'easy' ? 30 : diff == 'hard' ? 80 : 50)
                          * (schema.spec.modifier == 'curse-fortitude' ? 3 : 2) / 2,
                        cel.bind(healedHP, postArr[hj] + 10 > monMaxHP ? monMaxHP : postArr[hj] + 10,
                          healedHP > postArr[hj] ? lists.set(postArr, hj, healedHP) : postArr
                        )))
                      : postArr
                    )
                  : postArr
                )
              : postArr
            ))))))))))))))
            : schema.spec.monsterHP}

        # --- Boss HP: apply hero damage to boss ---
        bossHP: >-
          ${schema.spec.lastAttackIsBoss ?
            cel.bind(s, schema.spec.lastAttackSeed,
            cel.bind(diff, schema.spec.difficulty,
            cel.bind(baseDmg,
              (diff == 'easy' ? random.seededInt(0, 20, s + '-d1') + 3
               : diff == 'hard' ? random.seededInt(0, 20, s + '-d1') + random.seededInt(0, 20, s + '-d2') + random.seededInt(0, 20, s + '-d3') + 8
               : random.seededInt(0, 12, s + '-d1') + random.seededInt(0, 12, s + '-d2') + 6)
              + random.seededInt(0, 20, s + '-dboss') + 3,
            cel.bind(classMult,
              schema.spec.lastAttackIsBackstab ? baseDmg * 3
              : schema.spec.heroClass == 'mage' ? (schema.spec.heroMana > 0 ? baseDmg * 13 / 10 : baseDmg / 2)
              : schema.spec.heroClass == 'rogue' ? baseDmg * 11 / 10
              : baseDmg,
            cel.bind(modMult,
              schema.spec.modifier == 'curse-darkness' ? classMult * 3 / 4
              : schema.spec.modifier == 'blessing-strength' ? classMult * 3 / 2
              : schema.spec.modifier == 'blessing-fortune' && random.seededInt(0, 100, s + '-crit') < 20 ? classMult * 2
              : classMult,
            cel.bind(wpnDmg, schema.spec.weaponUses > 0 ? modMult + schema.spec.weaponBonus : modMult,
            cel.bind(helmDmg, schema.spec.helmetBonus > 0 && random.seededInt(0, 100, s + '-helmet-crit') < schema.spec.helmetBonus ? wpnDmg * 2 : wpnDmg,
            cel.bind(amuDmg, schema.spec.amuletBonus > 0 ? helmDmg * (100 + schema.spec.amuletBonus) / 100 : helmDmg,
            cel.bind(finalDmg, schema.spec.stunTurns > 0 ? 0 : amuDmg,
            cel.bind(newBossHP, schema.spec.bossHP - finalDmg < 0 ? 0 : schema.spec.bossHP - finalDmg,
              newBossHP
            ))))))))))
            : schema.spec.bossHP}

        # --- Weapon uses: decrement if weapon was used ---
        weaponUses: >-
          ${schema.spec.weaponUses > 0 ? schema.spec.weaponUses - 1 : 0}

        # --- Weapon bonus: zero out if weapon broke ---
        weaponBonus: >-
          ${schema.spec.weaponUses > 0 && schema.spec.weaponUses - 1 == 0 ? 0 : schema.spec.weaponBonus}

        # --- Hero mana: decrement if mage attacked with mana, regen on monster kill ---
        heroMana: >-
          ${cel.bind(s, schema.spec.lastAttackSeed,
          cel.bind(mana, schema.spec.heroMana,
          cel.bind(usedMana,
            schema.spec.heroClass == 'mage' && mana > 0 && !schema.spec.lastAttackIsBackstab && schema.spec.stunTurns == 0,
          cel.bind(manaAfterUse, usedMana ? mana - 1 : mana,
          cel.bind(diff, schema.spec.difficulty,
          cel.bind(baseDmg,
            (diff == 'easy' ? random.seededInt(0, 20, s + '-d1') + 3
             : diff == 'hard' ? random.seededInt(0, 20, s + '-d1') + random.seededInt(0, 20, s + '-d2') + random.seededInt(0, 20, s + '-d3') + 8
             : random.seededInt(0, 12, s + '-d1') + random.seededInt(0, 12, s + '-d2') + 6)
            + (schema.spec.lastAttackIsBoss ? random.seededInt(0, 20, s + '-dboss') + 3 : 0),
          cel.bind(classMult,
            schema.spec.lastAttackIsBackstab ? baseDmg * 3
            : schema.spec.heroClass == 'mage' ? (mana > 0 ? baseDmg * 13 / 10 : baseDmg / 2)
            : schema.spec.heroClass == 'rogue' ? baseDmg * 11 / 10
            : baseDmg,
          cel.bind(modMult,
            schema.spec.modifier == 'curse-darkness' ? classMult * 3 / 4
            : schema.spec.modifier == 'blessing-strength' ? classMult * 3 / 2
            : schema.spec.modifier == 'blessing-fortune' && random.seededInt(0, 100, s + '-crit') < 20 ? classMult * 2
            : classMult,
          cel.bind(wpnDmg, schema.spec.weaponUses > 0 ? modMult + schema.spec.weaponBonus : modMult,
          cel.bind(helmDmg, schema.spec.helmetBonus > 0 && random.seededInt(0, 100, s + '-helmet-crit') < schema.spec.helmetBonus ? wpnDmg * 2 : wpnDmg,
          cel.bind(amuDmg, schema.spec.amuletBonus > 0 ? helmDmg * (100 + schema.spec.amuletBonus) / 100 : helmDmg,
          cel.bind(finalDmg, schema.spec.stunTurns > 0 ? 0 : amuDmg,
          cel.bind(killedMonster,
            !schema.spec.lastAttackIsBoss && schema.spec.lastAttackIndex >= 0
            && schema.spec.monsterHP[schema.spec.lastAttackIndex] > 0
            && schema.spec.monsterHP[schema.spec.lastAttackIndex] - finalDmg <= 0,
