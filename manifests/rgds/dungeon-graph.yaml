apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: dungeon-graph
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: Dungeon
    group: game.k8s.example
    spec:
      monsters: integer | default=3 minimum=1 maximum=10
      difficulty: string | default="normal" enum=easy,normal,hard
      monsterHP: "[]integer"
      bossHP: integer | default=0
      heroHP: integer | default=100
      heroClass: string | default="warrior" enum=warrior,mage,rogue
      heroMana: integer | default=0
      tauntActive: integer | default=0
      backstabCooldown: integer | default=0
      modifier: string | default="none"
      inventory: string | default=""
      weaponBonus: integer | default=0
      weaponUses: integer | default=0
      armorBonus: integer | default=0
      shieldBonus: integer | default=0
      poisonTurns: integer | default=0
      burnTurns: integer | default=0
      stunTurns: integer | default=0
      treasureOpened: integer | default=0
      currentRoom: integer | default=1
      doorUnlocked: integer | default=0
      room2MonsterHP: "[]integer"
      room2BossHP: integer | default=0
      lastHeroAction: string | default=""
      lastEnemyAction: string | default=""
      lastCombatLog: string | default=""
      lastLootDrop: string | default=""
      attackSeq: integer | default=0
      actionSeq: integer | default=0
    status:
      livingMonsters: "${size(monsterCRs.filter(m, m.status.?entityState.orValue('alive') == 'alive'))}"
      bossState: "${bossCR.status.?entityState.orValue('pending')}"
      victory: "${bossCR.status.?entityState.orValue('pending') == 'defeated'}"
      defeat: "${heroCR.status.?entityState.orValue('alive') == 'defeated'}"
      loot: "${treasureCR.status.?loot.orValue('')}"
      treasureState: "${treasureCR.status.?treasureState.orValue('unopened')}"
      modifier: "${modifierCR.status.?effect.orValue('No modifier')}"
      modifierType: "${modifierCR.status.?modifierType.orValue('none')}"
      maxHeroHP: "${heroCR.status.?maxHP.orValue('100')}"
      maxMonsterHP: "${gameConfig.data.maxMonsterHP}"
      maxBossHP: "${gameConfig.data.maxBossHP}"
      diceFormula: "${gameConfig.data.diceFormula}"
      monsterCounter: "${gameConfig.data.monsterCounter}"
      bossCounter: "${gameConfig.data.bossCounter}"

  resources:
    # --- Namespace per dungeon ---
    - id: ns
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.metadata.name}
          labels:
            game.k8s.example/dungeon: ${schema.metadata.name}

    # --- Hero CR ---
    - id: heroCR
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Hero
        metadata:
          name: "${schema.metadata.name + '-hero'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          hp: ${schema.spec.heroHP}
          difficulty: ${schema.spec.difficulty}
          heroClass: ${schema.spec.heroClass}
          mana: ${schema.spec.heroMana}

    # --- Monster CRs ---
    - id: monsterCRs
      forEach:
        - idx: ${lists.range(size(schema.spec.monsterHP))}
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Monster
        metadata:
          name: "${schema.metadata.name + '-monster-' + string(idx)}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          index: ${idx}
          hp: ${schema.spec.monsterHP[idx]}
          difficulty: ${schema.spec.difficulty}

    # --- Boss CR ---
    - id: bossCR
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Boss
        metadata:
          name: "${schema.metadata.name + '-boss'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          hp: ${schema.spec.bossHP}
          difficulty: ${schema.spec.difficulty}
          monstersAlive: "${size(schema.spec.monsterHP.filter(hp, hp > 0))}"

    # --- Treasure CR ---
    - id: treasureCR
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Treasure
        metadata:
          name: "${schema.metadata.name + '-treasure'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          opened: ${schema.spec.treasureOpened}

    # --- Modifier CR (conditional) ---
    - id: modifierCR
      includeWhen:
        - ${schema.spec.modifier != "none"}
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Modifier
        metadata:
          name: "${schema.metadata.name + '-modifier'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          modifierType: ${schema.spec.modifier}

    # --- Game config ---
    - id: gameConfig
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${schema.metadata.name + '-config'}"
          namespace: ${ns.metadata.name}
        data:
          maxMonsterHP: "${schema.spec.difficulty == 'easy' ? '30' : schema.spec.difficulty == 'hard' ? '80' : '50'}"
          maxBossHP: "${schema.spec.difficulty == 'easy' ? '200' : schema.spec.difficulty == 'hard' ? '800' : '400'}"
          diceFormula: "${schema.spec.difficulty == 'easy' ? '1d20+2' : schema.spec.difficulty == 'hard' ? '3d20+5' : '2d12+4'}"
          monsterCounter: "${schema.spec.difficulty == 'easy' ? '1' : schema.spec.difficulty == 'hard' ? '3' : '2'}"
          bossCounter: "${schema.spec.difficulty == 'easy' ? '3' : schema.spec.difficulty == 'hard' ? '8' : '5'}"

    # =========================================================================
    # COMBAT ENGINE — CEL-computed ConfigMap (replaces attack-graph Job)
    #
    # The backend creates/overwrites the Attack CR with a fixed name
    # (<dungeonName>-latest-attack) on every player combat action.
    # kro watches this externalRef and re-reconciles dungeon-graph.
    # CEL here computes the full combat result into a ConfigMap.
    # The backend Go controller reads this ConfigMap and patches the Dungeon CR.
    # No Job, no bash, no kubectl from within the cluster.
    # =========================================================================
    - id: combatResult
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${schema.metadata.name + '-combat-result'}"
          namespace: ${ns.metadata.name}
          labels:
            game.k8s.example/dungeon: ${schema.metadata.name}
            game.k8s.example/type: combat-result
        data:
          # Sequence number — backend reads this to detect a new result
          pendingSeq: "${string(schema.spec.attackSeq)}"

          # === DICE ROLL (seeded by Attack CR uid for true randomness) ===
          # Alphabet chars map 0-35, giving 36 distinct values per char.
          # easy: 1d20+2 (3-22), normal: 2d12+4 (6-28), hard: 3d20+5 (8-65)
          # Boss: +1 die +3 mod on top of base
          diceRoll: >-
            ${
              schema.spec.difficulty == 'easy' ? string(
                int('abcdefghijklmnopqrstuvwxyz0123456789'.indexOf(random.seededString(1, schema.spec.lastCombatLog + 'd1')) % 20) + 3
              ) :
              schema.spec.difficulty == 'hard' ? string(
                int('abcdefghijklmnopqrstuvwxyz0123456789'.indexOf(random.seededString(1, schema.spec.lastCombatLog + 'd1')) % 20) +
                int('abcdefghijklmnopqrstuvwxyz0123456789'.indexOf(random.seededString(1, schema.spec.lastCombatLog + 'd2')) % 20) +
                int('abcdefghijklmnopqrstuvwxyz0123456789'.indexOf(random.seededString(1, schema.spec.lastCombatLog + 'd3')) % 20) + 8
              ) : string(
                int('abcdefghijklmnopqrstuvwxyz0123456789'.indexOf(random.seededString(1, schema.spec.lastCombatLog + 'd1')) % 12) +
                int('abcdefghijklmnopqrstuvwxyz0123456789'.indexOf(random.seededString(1, schema.spec.lastCombatLog + 'd2')) % 12) + 6
              )
            }

    # =========================================================================
    # ACTION ENGINE — CEL-computed ConfigMap (replaces action-graph Job)
    #
    # The backend creates/overwrites the Action CR with a fixed name
    # (<dungeonName>-latest-action) on every non-combat player action.
    # CEL computes all deterministic state transitions here.
    # The backend Go controller reads this ConfigMap and patches the Dungeon CR.
    # =========================================================================
    - id: actionResult
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${schema.metadata.name + '-action-result'}"
          namespace: ${ns.metadata.name}
          labels:
            game.k8s.example/dungeon: ${schema.metadata.name}
            game.k8s.example/type: action-result
        data:
          pendingSeq: "${string(schema.spec.actionSeq)}"

          # === USE HP POTION ===
          # new heroHP after use (clamped to class max, using ternary since math.least unavailable)
          hpAfterPotion: >-
            ${
              string(
                schema.spec.heroClass == 'warrior' ? (schema.spec.heroHP + 999 < 200 ? schema.spec.heroHP + 999 : 200) :
                schema.spec.heroClass == 'mage'    ? (schema.spec.heroHP + 999 < 120 ? schema.spec.heroHP + 999 : 120) :
                                                     (schema.spec.heroHP + 999 < 150 ? schema.spec.heroHP + 999 : 150)
              )
            }
          hpAfterPotionCommon: >-
            ${
              string(
                schema.spec.heroClass == 'warrior' ? (schema.spec.heroHP + 20 < 200 ? schema.spec.heroHP + 20 : 200) :
                schema.spec.heroClass == 'mage'    ? (schema.spec.heroHP + 20 < 120 ? schema.spec.heroHP + 20 : 120) :
                                                     (schema.spec.heroHP + 20 < 150 ? schema.spec.heroHP + 20 : 150)
              )
            }
          hpAfterPotionRare: >-
            ${
              string(
                schema.spec.heroClass == 'warrior' ? (schema.spec.heroHP + 40 < 200 ? schema.spec.heroHP + 40 : 200) :
                schema.spec.heroClass == 'mage'    ? (schema.spec.heroHP + 40 < 120 ? schema.spec.heroHP + 40 : 120) :
                                                     (schema.spec.heroHP + 40 < 150 ? schema.spec.heroHP + 40 : 150)
              )
            }

          # === MANA POTION ===
          manaAfterCommon: "${string(schema.spec.heroMana + 2 < 5 ? schema.spec.heroMana + 2 : 5)}"
          manaAfterRare:   "${string(schema.spec.heroMana + 3 < 5 ? schema.spec.heroMana + 3 : 5)}"
          manaAfterEpic:   "${string(schema.spec.heroMana + 5 < 5 ? schema.spec.heroMana + 5 : 5)}"

          # === EQUIP WEAPON ===
          weaponBonusCommon: "5"
          weaponBonusRare:   "10"
          weaponBonusEpic:   "20"
          weaponUses:        "3"

          # === EQUIP ARMOR ===
          armorBonusCommon: "10"
          armorBonusRare:   "20"
          armorBonusEpic:   "30"

          # === EQUIP SHIELD ===
          shieldBonusCommon: "10"
          shieldBonusRare:   "15"
          shieldBonusEpic:   "25"

          # === ROOM 2 HP ARRAYS ===
          # Room 2 HP scales from Room 1 base: monsters ×1.5, boss ×1.3
          # Modifier adjustments: blessing ×0.9, curse ×1.1
          # Base values — easy: m=30 b=200, normal: m=50 b=400, hard: m=80 b=800
          room2MonsterHPValue: >-
            ${
              schema.spec.difficulty == 'easy'   ?
                (schema.spec.modifier.contains('blessing') ? '40' : schema.spec.modifier.contains('curse') ? '49' : '45') :
              schema.spec.difficulty == 'hard'   ?
                (schema.spec.modifier.contains('blessing') ? '108' : schema.spec.modifier.contains('curse') ? '132' : '120') :
                (schema.spec.modifier.contains('blessing') ? '67' : schema.spec.modifier.contains('curse') ? '82' : '75')
            }
          room2BossHP: >-
            ${
              schema.spec.difficulty == 'easy'   ?
                (schema.spec.modifier.contains('blessing') ? '234' : schema.spec.modifier.contains('curse') ? '286' : '260') :
              schema.spec.difficulty == 'hard'   ?
                (schema.spec.modifier.contains('blessing') ? '936' : schema.spec.modifier.contains('curse') ? '1144' : '1040') :
                (schema.spec.modifier.contains('blessing') ? '468' : schema.spec.modifier.contains('curse') ? '572' : '520')
            }
          monsterCount: "${string(size(schema.spec.monsterHP))}"

          # === OPEN TREASURE guard ===
          canOpenTreasure: >-
            ${
              string(schema.spec.bossHP <= 0 && size(schema.spec.monsterHP.filter(hp, hp > 0)) == 0)
            }

          # === UNLOCK DOOR guard ===
          canUnlockDoor: "${string(schema.spec.treasureOpened == 1)}"

          # === ENTER ROOM 2 guard ===
          canEnterRoom2: "${string(schema.spec.doorUnlocked == 1)}"

          # Backstab cooldown after decrement (used by all actions)
          backstabCDAfterDecrement: >-
            ${
              string(schema.spec.backstabCooldown > 0 ? schema.spec.backstabCooldown - 1 : 0)
            }
