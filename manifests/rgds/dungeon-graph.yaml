apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: dungeon-graph
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  schema:
    apiVersion: v1alpha1
    kind: Dungeon
    group: game.k8s.example
    spec:
      # --- Immutable player choices (set at creation, never mutated) ---
      monsters: integer | default=3 minimum=1 maximum=10
      difficulty: string | default="normal" enum=easy,normal,hard
      heroClass: string | default="warrior" enum=warrior,mage,rogue
      runCount: integer | default=0
      # --- Trigger fields (backend writes, state nodes read) ---
      attackSeq: integer | default=0
      actionSeq: integer | default=0
      lastAttackTarget: string | default=""
      lastAttackSeed: string | default=""
      lastAttackIndex: integer | default=-1
      lastAttackIsBoss: boolean | default=false
      lastAttackIsBackstab: boolean | default=false
      lastAbility: string | default=""
      lastAction: string | default=""
      # --- Backend-written display/accumulator fields ---
      lastHeroAction: string | default=""
      lastEnemyAction: string | default=""
      lastCombatLog: string | default=""
      xpEarned: integer | default=0
      # --- Read-only migration fields (spec → status.game rolling migration) ---
      # These fields are NOT written by backend or kro state nodes. They exist
      # solely so kstate() can fall back to schema.spec.X for existing dungeons
      # that were created before the state-node migration. Once the 4-hour reaper
      # cleans all pre-migration dungeons, these fields can be removed.
      heroHP: integer | default=0
      heroMana: integer | default=0
      monsterHP: "[]integer"
      bossHP: integer | default=0
      modifier: string | default="none"
      monsterTypes: "[]string"
      inventory: string | default=""
      weaponBonus: integer | default=0
      weaponUses: integer | default=0
      armorBonus: integer | default=0
      shieldBonus: integer | default=0
      helmetBonus: integer | default=0
      pantsBonus: integer | default=0
      bootsBonus: integer | default=0
      ringBonus: integer | default=0
      amuletBonus: integer | default=0
      poisonTurns: integer | default=0
      burnTurns: integer | default=0
      stunTurns: integer | default=0
      tauntActive: integer | default=0
      backstabCooldown: integer | default=0
      treasureOpened: integer | default=0
      currentRoom: integer | default=1
      doorUnlocked: integer | default=0
      room2MonsterHP: "[]integer"
      room2BossHP: integer | default=0
      lastLootDrop: string | default=""
      initProcessedSeq: integer | default=0
      combatProcessedSeq: integer | default=0
      abilityProcessedSeq: integer | default=0
      dotProcessedSeq: integer | default=0
      tauntProcessedSeq: integer | default=0
      cooldownProcessedSeq: integer | default=0
      ringProcessedSeq: integer | default=0
      actionProcessedSeq: integer | default=0
      room2ProcessedSeq: integer | default=0
    status:
      # --- Child CR projections (unchanged — read from child RGD statuses) ---
      livingMonsters: "${size(monsterCRs.filter(m, m.status.?entityState.orValue('alive') == 'alive'))}"
      bossState: "${bossCR.status.?entityState.orValue('pending')}"
      bossPhase: "${bossCR.status.?phase.orValue('phase1')}"
      bossDamageMultiplier: "${bossCR.status.?damageMultiplier.orValue('10')}"
      bossSpecialAttackChance: "${bossCR.status.?specialAttackChance.orValue('20')}"
      victory: "${bossCR.status.?entityState.orValue('pending') == 'defeated'}"
      defeat: "${heroCR.status.?entityState.orValue('alive') == 'defeated'}"
      loot: "${treasureCR.status.?loot.orValue('')}"
      treasureState: "${treasureCR.status.?treasureState.orValue('unopened')}"
      modifier: "${modifierCR.status.?effect.orValue('No modifier')}"
      modifierType: "${modifierCR.status.?modifierType.orValue('none')}"
      maxHeroHP: "${heroCR.status.?maxHP.orValue('100')}"
      maxHeroMana: "${gameConfig.data.heroMana}"
      maxMonsterHP: "${gameConfig.data.maxMonsterHP}"
      maxBossHP: "${gameConfig.data.maxBossHP}"
      diceFormula: "${gameConfig.data.diceFormula}"
      monsterCounter: "${gameConfig.data.monsterCounter}"
      bossCounter: "${gameConfig.data.bossCounter}"

  resources:
    # --- Namespace per dungeon ---
    - id: ns
      template:
        apiVersion: v1
        kind: Namespace
        metadata:
          name: ${schema.metadata.name}
          labels:
            game.k8s.example/dungeon: ${schema.metadata.name}

    # --- Hero CR (reads game state from status.game) ---
    - id: heroCR
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Hero
        metadata:
          name: "${schema.metadata.name + '-hero'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          hp: ${kstate(schema.status.game, 'heroHP', schema.spec.heroHP)}
          difficulty: ${schema.spec.difficulty}
          heroClass: ${schema.spec.heroClass}
          mana: ${kstate(schema.status.game, 'heroMana', schema.spec.heroMana)}

    # --- Monster CRs (reads monsterHP array from status.game) ---
    - id: monsterCRs
      forEach:
        - idx: "${has(schema.status.game.monsterHP) ? lists.range(size(schema.status.game.monsterHP)) : (has(schema.spec.monsterHP) ? lists.range(size(schema.spec.monsterHP)) : [])}"
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Monster
        metadata:
          name: "${schema.metadata.name + '-monster-' + string(idx)}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          index: ${idx}
          hp: "${has(schema.status.game.monsterHP) ? int(schema.status.game.monsterHP[idx]) : (has(schema.spec.monsterHP) ? int(schema.spec.monsterHP[idx]) : 0)}"
          difficulty: ${schema.spec.difficulty}

    # --- Boss CR (reads bossHP and monsterHP from status.game) ---
    - id: bossCR
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Boss
        metadata:
          name: "${schema.metadata.name + '-boss'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          hp: ${kstate(schema.status.game, 'bossHP', schema.spec.bossHP)}
          maxHP: "${schema.spec.difficulty == 'easy' ? 200 : schema.spec.difficulty == 'hard' ? 800 : 400}"
          difficulty: ${schema.spec.difficulty}
          monstersAlive: "${has(schema.status.game.monsterHP) ? size(schema.status.game.monsterHP.filter(hp, int(hp) > 0)) : (has(schema.spec.monsterHP) ? size(schema.spec.monsterHP.filter(hp, int(hp) > 0)) : 0)}"

    # --- Treasure CR (reads treasureOpened from status.game) ---
    - id: treasureCR
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Treasure
        metadata:
          name: "${schema.metadata.name + '-treasure'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          opened: ${kstate(schema.status.game, 'treasureOpened', schema.spec.treasureOpened)}

    # --- Modifier CR (reads modifier from status.game, conditional) ---
    - id: modifierCR
      includeWhen:
        - ${kstate(schema.status.game, 'modifier', schema.spec.modifier) != "none"}
      readyWhen:
        - "${modifierCR.status.?modifierType.orValue('') != ''}"
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Modifier
        metadata:
          name: "${schema.metadata.name + '-modifier'}"
          namespace: ${ns.metadata.name}
        spec:
          dungeonName: ${schema.metadata.name}
          modifierType: ${kstate(schema.status.game, 'modifier', schema.spec.modifier)}

    # --- Game config (reads immutable fields from spec — unchanged) ---
    - id: gameConfig
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${schema.metadata.name + '-config'}"
          namespace: ${ns.metadata.name}
        data:
          maxMonsterHP: "${schema.spec.difficulty == 'easy' ? '30' : schema.spec.difficulty == 'hard' ? '80' : '50'}"
          maxBossHP: "${schema.spec.difficulty == 'easy' ? '200' : schema.spec.difficulty == 'hard' ? '800' : '400'}"
          diceFormula: "${schema.spec.difficulty == 'easy' ? '1d20+3' : schema.spec.difficulty == 'hard' ? '3d20+8' : '2d12+6'}"
          monsterCounter: "${schema.spec.difficulty == 'easy' ? '1' : schema.spec.difficulty == 'hard' ? '3' : '2'}"
          bossCounter: "${schema.spec.difficulty == 'easy' ? '3' : schema.spec.difficulty == 'hard' ? '8' : '5'}"

    # ===================================================================
    # dungeonInit: compute all starting game state from player choices.
    # Gate: initProcessedSeq == 0 (fires exactly once at creation).
    # Backend writes only: monsters, difficulty, heroClass, runCount,
    # and optional NG+ gear carry-overs. kro computes everything else.
    # ===================================================================
    - id: dungeonInit
      state:
        storeName: game
        fields:
          # --- Hero HP by class, scaled by New Game+ runCount (+10% per run compounded) ---
          heroHP: >-
            ${cel.bind(base, schema.spec.heroClass == 'warrior' ? 200 : schema.spec.heroClass == 'mage' ? 120 : schema.spec.heroClass == 'rogue' ? 150 : 100,
            cel.bind(rc, schema.spec.runCount > 20 ? 20 : (schema.spec.runCount < 0 ? 0 : schema.spec.runCount),
            cel.bind(s1, rc >= 1 ? base * 110 / 100 : base,
            cel.bind(s2, rc >= 2 ? s1 * 110 / 100 : s1,
            cel.bind(s3, rc >= 3 ? s2 * 110 / 100 : s2,
            cel.bind(s4, rc >= 4 ? s3 * 110 / 100 : s3,
            cel.bind(s5, rc >= 5 ? s4 * 110 / 100 : s4,
            cel.bind(s6, rc >= 6 ? s5 * 110 / 100 : s5,
            cel.bind(s7, rc >= 7 ? s6 * 110 / 100 : s6,
            cel.bind(s8, rc >= 8 ? s7 * 110 / 100 : s7,
            cel.bind(s9, rc >= 9 ? s8 * 110 / 100 : s8,
            cel.bind(s10, rc >= 10 ? s9 * 110 / 100 : s9,
            rc > 10 ? s10 * (rc == 11 ? 110 : rc == 12 ? 121 : rc == 13 ? 133 : rc == 14 ? 146 : rc == 15 ? 161 : rc == 16 ? 177 : rc == 17 ? 195 : rc == 18 ? 214 : rc == 19 ? 236 : 259) / 100 : s10
            ))))))))))))}

          # --- Hero mana by class ---
          heroMana: >-
            ${schema.spec.heroClass == 'mage' ? 8 : 0}

          # --- Monster HP array: base by difficulty, curse-fortitude +50%, NG+ scale ---
          monsterHP: >-
            ${cel.bind(diff, schema.spec.difficulty,
            cel.bind(base, diff == 'easy' ? 30 : diff == 'hard' ? 80 : 50,
            cel.bind(rc, schema.spec.runCount > 20 ? 20 : (schema.spec.runCount < 0 ? 0 : schema.spec.runCount),
            cel.bind(alpha, 'abcdefghijklmnopqrstuvwxyz0123456789',
            cel.bind(name, schema.metadata.name,
            cel.bind(modIdx, alpha.indexOf(random.seededString(1, name + '-mod')) % 10,
            cel.bind(mod, modIdx == 0 ? 'none' : modIdx == 1 ? 'curse-fortitude' : modIdx == 2 ? 'curse-fury' : modIdx == 3 ? 'curse-darkness' : modIdx == 4 ? 'blessing-strength' : modIdx == 5 ? 'blessing-resilience' : modIdx == 6 ? 'blessing-fortune' : modIdx == 7 ? 'blessing-strength' : modIdx == 8 ? 'curse-fury' : 'blessing-fortune',
            cel.bind(fortified, mod == 'curse-fortitude' ? base * 3 / 2 : base,
            cel.bind(sc1, rc >= 1 ? fortified * 125 / 100 : fortified,
            cel.bind(sc2, rc >= 2 ? sc1 * 125 / 100 : sc1,
            cel.bind(sc3, rc >= 3 ? sc2 * 125 / 100 : sc2,
            cel.bind(sc4, rc >= 4 ? sc3 * 125 / 100 : sc3,
            cel.bind(sc5, rc >= 5 ? sc4 * 125 / 100 : sc4,
            cel.bind(sc6, rc >= 6 ? sc5 * 125 / 100 : sc5,
            cel.bind(sc7, rc >= 7 ? sc6 * 125 / 100 : sc6,
            cel.bind(sc8, rc >= 8 ? sc7 * 125 / 100 : sc7,
            cel.bind(sc9, rc >= 9 ? sc8 * 125 / 100 : sc8,
            cel.bind(sc10, rc >= 10 ? sc9 * 125 / 100 : sc9,
            cel.bind(mhp, rc > 10 ? sc10 * (rc == 11 ? 125 : rc == 12 ? 156 : rc == 13 ? 195 : rc == 14 ? 244 : rc == 15 ? 305 : rc == 16 ? 381 : rc == 17 ? 476 : rc == 18 ? 596 : rc == 19 ? 745 : 931) / 100 : sc10,
            lists.range(schema.spec.monsters).map(i, mhp)
            )))))))))))))))))))}

          # --- Boss HP: base by difficulty, NG+ scaled ---
          bossHP: >-
            ${cel.bind(diff, schema.spec.difficulty,
            cel.bind(base, diff == 'easy' ? 200 : diff == 'hard' ? 800 : 400,
            cel.bind(rc, schema.spec.runCount > 20 ? 20 : (schema.spec.runCount < 0 ? 0 : schema.spec.runCount),
            cel.bind(sc1, rc >= 1 ? base * 125 / 100 : base,
            cel.bind(sc2, rc >= 2 ? sc1 * 125 / 100 : sc1,
            cel.bind(sc3, rc >= 3 ? sc2 * 125 / 100 : sc2,
            cel.bind(sc4, rc >= 4 ? sc3 * 125 / 100 : sc3,
            cel.bind(sc5, rc >= 5 ? sc4 * 125 / 100 : sc4,
            cel.bind(sc6, rc >= 6 ? sc5 * 125 / 100 : sc5,
            cel.bind(sc7, rc >= 7 ? sc6 * 125 / 100 : sc6,
            cel.bind(sc8, rc >= 8 ? sc7 * 125 / 100 : sc7,
            cel.bind(sc9, rc >= 9 ? sc8 * 125 / 100 : sc8,
            cel.bind(sc10, rc >= 10 ? sc9 * 125 / 100 : sc9,
            rc > 10 ? sc10 * (rc == 11 ? 125 : rc == 12 ? 156 : rc == 13 ? 195 : rc == 14 ? 244 : rc == 15 ? 305 : rc == 16 ? 381 : rc == 17 ? 476 : rc == 18 ? 596 : rc == 19 ? 745 : 931) / 100 : sc10
            )))))))))))))}

          # --- Modifier: deterministic from dungeon name via seeded random ---
          modifier: >-
            ${cel.bind(alpha, 'abcdefghijklmnopqrstuvwxyz0123456789',
            cel.bind(name, schema.metadata.name,
            cel.bind(modIdx, alpha.indexOf(random.seededString(1, name + '-mod')) % 10,
            modIdx == 0 ? 'none' : modIdx == 1 ? 'curse-fortitude' : modIdx == 2 ? 'curse-fury' : modIdx == 3 ? 'curse-darkness' : modIdx == 4 ? 'blessing-strength' : modIdx == 5 ? 'blessing-resilience' : modIdx == 6 ? 'blessing-fortune' : modIdx == 7 ? 'blessing-strength' : modIdx == 8 ? 'curse-fury' : 'blessing-fortune'
            )))}

          # --- Monster types: goblin(0), skeleton(1), archer(even>=2), shaman(odd>=3) ---
          monsterTypes: >-
            ${lists.range(schema.spec.monsters).map(i, i == 0 ? 'goblin' : i == 1 ? 'skeleton' : i % 2 == 0 ? 'archer' : 'shaman')}

          # --- Initialize equipment/status defaults ---
          inventory: "${''}"
          weaponBonus: "${0}"
          weaponUses: "${0}"
          armorBonus: "${0}"
          shieldBonus: "${0}"
          helmetBonus: "${0}"
          pantsBonus: "${0}"
          bootsBonus: "${0}"
          ringBonus: "${0}"
          amuletBonus: "${0}"
          poisonTurns: "${0}"
          burnTurns: "${0}"
          stunTurns: "${0}"
          tauntActive: "${0}"
          backstabCooldown: "${0}"
          treasureOpened: "${0}"
          currentRoom: "${1}"
          doorUnlocked: "${0}"
          lastLootDrop: "${''}"

          # --- Sentinel: mark init complete ---
          initProcessedSeq: "${1}"

          # --- Initialize all processed seq sentinels ---
          combatProcessedSeq: "${0}"
          abilityProcessedSeq: "${0}"
          dotProcessedSeq: "${0}"
          tauntProcessedSeq: "${0}"
          cooldownProcessedSeq: "${0}"
          ringProcessedSeq: "${0}"
          actionProcessedSeq: "${0}"
          room2ProcessedSeq: "${0}"

      includeWhen:
        - "${kstate(schema.status.game, 'initProcessedSeq', schema.spec.initProcessedSeq) == 0}"

    # ===================================================================
    # abilityResolve: mage heal or warrior taunt.
    # Gate: attackSeq advanced past abilityProcessedSeq AND lastAbility set.
    # ===================================================================
    - id: abilityResolve
      state:
        storeName: game
        fields:
          # Mage heal: min(heroHP + 40, 120); warrior taunt: no change
          heroHP: >-
            ${cel.bind(lastAbility, schema.spec.lastAbility,
            cel.bind(hp, kstate(schema.status.game, 'heroHP', schema.spec.heroHP),
              lastAbility == 'mage-heal'
                ? (hp + 40 > 120 ? 120 : hp + 40)
                : hp
            ))}
          # Mage heal: heroMana - 2; warrior taunt: no change
          heroMana: >-
            ${cel.bind(lastAbility, schema.spec.lastAbility,
            cel.bind(mana, kstate(schema.status.game, 'heroMana', schema.spec.heroMana),
              lastAbility == 'mage-heal'
                ? mana - 2
                : mana
            ))}
          # Warrior taunt: activate (set to 1); mage heal: no change
          tauntActive: >-
            ${cel.bind(lastAbility, schema.spec.lastAbility,
              lastAbility == 'warrior-taunt'
                ? 1
                : kstate(schema.status.game, 'tauntActive', schema.spec.tauntActive)
            )}
          # Warrior taunt: pre-arm tauntProcessedSeq so advanceTaunt doesn't fire this turn
          tauntProcessedSeq: >-
            ${schema.spec.lastAbility == 'warrior-taunt'
              ? schema.spec.attackSeq
              : kstate(schema.status.game, 'tauntProcessedSeq', schema.spec.tauntProcessedSeq)}
          # Advance sentinel
          abilityProcessedSeq: "${schema.spec.attackSeq}"
      includeWhen:
        - "${schema.spec.attackSeq > kstate(schema.status.game, 'abilityProcessedSeq', schema.spec.abilityProcessedSeq) && schema.spec.lastAbility != ''}"

    # ===================================================================
    # tickDoT: decrement poison/burn and apply HP damage, once per attack turn.
    # Gate: attackSeq advanced past dotProcessedSeq AND combatResolve already
    # fired (combatProcessedSeq >= attackSeq) AND at least one DoT active.
    # Only fires on combat turns (combatResolve done), not ability turns.
    # ===================================================================
    - id: tickDoT
      state:
        storeName: game
        fields:
          heroHP: >-
            ${cel.bind(hp, kstate(schema.status.game, 'heroHP', schema.spec.heroHP),
            cel.bind(poison, kstate(schema.status.game, 'poisonTurns', schema.spec.poisonTurns),
            cel.bind(burn, kstate(schema.status.game, 'burnTurns', schema.spec.burnTurns),
            cel.bind(dmg, (poison > 0 ? 5 : 0) + (burn > 0 ? 8 : 0),
              hp - dmg < 0 ? 0 : hp - dmg
            ))))}
          poisonTurns: >-
            ${cel.bind(pt, kstate(schema.status.game, 'poisonTurns', schema.spec.poisonTurns),
              pt > 0 ? pt - 1 : 0
            )}
          burnTurns: >-
            ${cel.bind(bt, kstate(schema.status.game, 'burnTurns', schema.spec.burnTurns),
              bt > 0 ? bt - 1 : 0
            )}
          dotProcessedSeq: "${schema.spec.attackSeq}"
      includeWhen:
        - "${schema.spec.attackSeq > kstate(schema.status.game, 'dotProcessedSeq', schema.spec.dotProcessedSeq) && kstate(schema.status.game, 'combatProcessedSeq', schema.spec.combatProcessedSeq) >= schema.spec.attackSeq && (kstate(schema.status.game, 'poisonTurns', schema.spec.poisonTurns) > 0 || kstate(schema.status.game, 'burnTurns', schema.spec.burnTurns) > 0)}"

    # ===================================================================
    # advanceTaunt: 1→2 (protecting) → 0 (expired), once per attack turn.
    # Gate: attackSeq advanced past tauntProcessedSeq AND taunt active.
    # ===================================================================
    - id: advanceTaunt
      state:
        storeName: game
        fields:
          tauntActive: >-
            ${kstate(schema.status.game, 'tauntActive', schema.spec.tauntActive) == 1 ? 2 : 0}
          tauntProcessedSeq: "${schema.spec.attackSeq}"
      includeWhen:
        - "${schema.spec.attackSeq > kstate(schema.status.game, 'tauntProcessedSeq', schema.spec.tauntProcessedSeq) && kstate(schema.status.game, 'tauntActive', schema.spec.tauntActive) > 0 && kstate(schema.status.game, 'combatProcessedSeq', schema.spec.combatProcessedSeq) >= schema.spec.attackSeq}"

    # ===================================================================
    # tickCooldown: decrement backstab cooldown once per attack or action turn.
    # Gate: sum of both seqs advanced past cooldownProcessedSeq AND cooldown > 0.
    # ===================================================================
    - id: tickCooldown
      state:
        storeName: game
        fields:
          backstabCooldown: >-
            ${kstate(schema.status.game, 'backstabCooldown', schema.spec.backstabCooldown) - 1}
          cooldownProcessedSeq: "${schema.spec.attackSeq + schema.spec.actionSeq}"
      includeWhen:
        - "${schema.spec.attackSeq + schema.spec.actionSeq > kstate(schema.status.game, 'cooldownProcessedSeq', schema.spec.cooldownProcessedSeq) && kstate(schema.status.game, 'backstabCooldown', schema.spec.backstabCooldown) > 0 && (kstate(schema.status.game, 'combatProcessedSeq', schema.spec.combatProcessedSeq) >= schema.spec.attackSeq || kstate(schema.status.game, 'abilityProcessedSeq', schema.spec.abilityProcessedSeq) >= schema.spec.attackSeq)}"

    # ===================================================================
    # regenRing: restore ringBonus HP per attack turn, capped at class max.
    # Gate: attackSeq advanced past ringProcessedSeq AND ringBonus active.
    # ===================================================================
    - id: regenRing
      state:
        storeName: game
        fields:
          heroHP: >-
            ${cel.bind(hp, kstate(schema.status.game, 'heroHP', schema.spec.heroHP),
            cel.bind(ring, kstate(schema.status.game, 'ringBonus', schema.spec.ringBonus),
            cel.bind(maxHP, schema.spec.heroClass == 'warrior' ? 200 : schema.spec.heroClass == 'mage' ? 120 : schema.spec.heroClass == 'rogue' ? 150 : 100,
              (hp + ring) > maxHP ? maxHP : (hp + ring)
            )))}
          ringProcessedSeq: "${schema.spec.attackSeq}"
      includeWhen:
        - "${schema.spec.attackSeq > kstate(schema.status.game, 'ringProcessedSeq', schema.spec.ringProcessedSeq) && kstate(schema.status.game, 'ringBonus', schema.spec.ringBonus) > 0 && kstate(schema.status.game, 'combatProcessedSeq', schema.spec.combatProcessedSeq) >= schema.spec.attackSeq}"

    # ===================================================================
    # combatResolve: compute all combat math in one atomic state write.
    # Gate: attackSeq advanced past combatProcessedSeq AND there's a target.
    # Uses cel.bind() for intermediate values and kro CEL extensions for RNG + arrays.
    # ===================================================================
    - id: combatResolve
      state:
        storeName: game
        fields:
          # --- Monster HP: apply hero damage + shaman heal ---
          monsterHP: >-
            ${!schema.spec.lastAttackIsBoss && schema.spec.lastAttackIndex >= 0 ?
              cel.bind(s, schema.spec.lastAttackSeed,
              cel.bind(diff, schema.spec.difficulty,
              cel.bind(curMonsterHP, has(schema.status.game.monsterHP) ? schema.status.game.monsterHP : (has(schema.spec.monsterHP) ? schema.spec.monsterHP : []),
              cel.bind(curModifier, kstate(schema.status.game, 'modifier', schema.spec.modifier),
              cel.bind(baseDmg,
                diff == 'easy' ? random.seededInt(0, 20, s + '-d1') + 3
                : diff == 'hard' ? random.seededInt(0, 20, s + '-d1') + random.seededInt(0, 20, s + '-d2') + random.seededInt(0, 20, s + '-d3') + 8
                : random.seededInt(0, 12, s + '-d1') + random.seededInt(0, 12, s + '-d2') + 6,
              cel.bind(classMult,
                schema.spec.lastAttackIsBackstab ? baseDmg * 3
                : schema.spec.heroClass == 'mage' ? (kstate(schema.status.game, 'heroMana', schema.spec.heroMana) > 0 ? baseDmg * 13 / 10 : baseDmg / 2)
                : schema.spec.heroClass == 'rogue' ? baseDmg * 11 / 10
                : baseDmg,
              cel.bind(modMult,
                curModifier == 'curse-darkness' ? classMult * 3 / 4
                : curModifier == 'blessing-strength' ? classMult * 3 / 2
                : curModifier == 'blessing-fortune' && random.seededInt(0, 100, s + '-crit') < 20 ? classMult * 2
                : classMult,
              cel.bind(wpnDmg, kstate(schema.status.game, 'weaponUses', schema.spec.weaponUses) > 0 ? modMult + kstate(schema.status.game, 'weaponBonus', schema.spec.weaponBonus) : modMult,
              cel.bind(helmDmg, kstate(schema.status.game, 'helmetBonus', schema.spec.helmetBonus) > 0 && random.seededInt(0, 100, s + '-helmet-crit') < kstate(schema.status.game, 'helmetBonus', schema.spec.helmetBonus) ? wpnDmg * 2 : wpnDmg,
              cel.bind(amuDmg, kstate(schema.status.game, 'amuletBonus', schema.spec.amuletBonus) > 0 ? helmDmg * (100 + kstate(schema.status.game, 'amuletBonus', schema.spec.amuletBonus)) / 100 : helmDmg,
