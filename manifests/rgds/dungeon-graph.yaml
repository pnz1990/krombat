            cel.bind(classMult,
              schema.spec.lastAttackIsBackstab ? baseDmg * 3
              : schema.spec.heroClass == 'mage' ? (kstate(schema.status.game, 'heroMana', schema.spec.heroMana) > 0 ? baseDmg * 13 / 10 : baseDmg / 2)
              : schema.spec.heroClass == 'rogue' ? baseDmg * 11 / 10
              : baseDmg,
            cel.bind(modMult,
              curModifier == 'curse-darkness' ? classMult * 3 / 4
              : curModifier == 'blessing-strength' ? classMult * 3 / 2
              : curModifier == 'blessing-fortune' && random.seededInt(0, 100, s + '-crit') < 20 ? classMult * 2
              : classMult,
            cel.bind(wpnDmg, kstate(schema.status.game, 'weaponUses', schema.spec.weaponUses) > 0 ? modMult + kstate(schema.status.game, 'weaponBonus', schema.spec.weaponBonus) : modMult,
            cel.bind(helmDmg, kstate(schema.status.game, 'helmetBonus', schema.spec.helmetBonus) > 0 && random.seededInt(0, 100, s + '-helmet-crit') < kstate(schema.status.game, 'helmetBonus', schema.spec.helmetBonus) ? wpnDmg * 2 : wpnDmg,
            cel.bind(amuDmg, kstate(schema.status.game, 'amuletBonus', schema.spec.amuletBonus) > 0 ? helmDmg * (100 + kstate(schema.status.game, 'amuletBonus', schema.spec.amuletBonus)) / 100 : helmDmg,
            cel.bind(finalDmg, kstate(schema.status.game, 'stunTurns', schema.spec.stunTurns) > 0 ? 0 : amuDmg,
            cel.bind(curMonsterHP, has(schema.status.game.monsterHP) ? schema.status.game.monsterHP : (has(schema.spec.monsterHP) ? schema.spec.monsterHP : []),
            cel.bind(monsterKill, !isBoss && idx >= 0 && size(curMonsterHP) > idx && int(curMonsterHP[idx]) > 0
              && int(curMonsterHP[idx]) - finalDmg <= 0,
            cel.bind(bossKill, isBoss && kstate(schema.status.game, 'bossHP', schema.spec.bossHP) > 0
              && kstate(schema.status.game, 'bossHP', schema.spec.bossHP) - finalDmg <= 0,
            cel.bind(types8, ['weapon','armor','hppotion','manapotion','shield','helmet','pants','boots'],
            cel.bind(types7, ['weapon','armor','hppotion','shield','helmet','pants','boots'],
              bossKill ?
                cel.bind(bRar, alpha.indexOf(random.seededString(1, name + '-boss-rar')) % 36,
                cel.bind(bRarity, bRar >= 18 ? 'epic' : 'rare',
                cel.bind(bTyp, alpha.indexOf(random.seededString(1, name + '-boss-typ')) % 7,
                  types7[bTyp] + '-' + bRarity
                )))
              : monsterKill ?
                cel.bind(mSeed, name + '-m' + string(idx),
                cel.bind(dropRoll, alpha.indexOf(random.seededString(1, mSeed + '-drop')) % 36,
                cel.bind(dropThresh, diff == 'easy' ? 22 : diff == 'hard' ? 13 : 16,
                  dropRoll < dropThresh ?
                    cel.bind(rarRoll, alpha.indexOf(random.seededString(1, mSeed + '-rar')) % 36,
                    cel.bind(mRarity, rarRoll >= 33 ? 'epic' : rarRoll >= 22 ? 'rare' : 'common',
                    cel.bind(typRoll, alpha.indexOf(random.seededString(1, mSeed + '-typ')) % 8,
                      types8[typRoll] + '-' + mRarity
                    )))
                  : ''
                )))
              : ''
            )))))))))))))))))))}

          # --- Inventory: add loot item if dropped and under cap ---
          inventory: >-
            ${cel.bind(s, schema.spec.lastAttackSeed,
            cel.bind(isBoss, schema.spec.lastAttackIsBoss,
            cel.bind(diff, schema.spec.difficulty,
            cel.bind(idx, schema.spec.lastAttackIndex,
            cel.bind(alpha, 'abcdefghijklmnopqrstuvwxyz0123456789',
            cel.bind(name, schema.metadata.name,
            cel.bind(curModifier, kstate(schema.status.game, 'modifier', schema.spec.modifier),
            cel.bind(curInventory, kstate(schema.status.game, 'inventory', schema.spec.inventory),
            cel.bind(baseDmg,
              (diff == 'easy' ? random.seededInt(0, 20, s + '-d1') + 3
               : diff == 'hard' ? random.seededInt(0, 20, s + '-d1') + random.seededInt(0, 20, s + '-d2') + random.seededInt(0, 20, s + '-d3') + 8
               : random.seededInt(0, 12, s + '-d1') + random.seededInt(0, 12, s + '-d2') + 6)
              + (isBoss ? random.seededInt(0, 20, s + '-dboss') + 3 : 0),
            cel.bind(classMult,
              schema.spec.lastAttackIsBackstab ? baseDmg * 3
              : schema.spec.heroClass == 'mage' ? (kstate(schema.status.game, 'heroMana', schema.spec.heroMana) > 0 ? baseDmg * 13 / 10 : baseDmg / 2)
              : schema.spec.heroClass == 'rogue' ? baseDmg * 11 / 10
              : baseDmg,
            cel.bind(modMult,
              curModifier == 'curse-darkness' ? classMult * 3 / 4
              : curModifier == 'blessing-strength' ? classMult * 3 / 2
              : curModifier == 'blessing-fortune' && random.seededInt(0, 100, s + '-crit') < 20 ? classMult * 2
              : classMult,
            cel.bind(wpnDmg, kstate(schema.status.game, 'weaponUses', schema.spec.weaponUses) > 0 ? modMult + kstate(schema.status.game, 'weaponBonus', schema.spec.weaponBonus) : modMult,
            cel.bind(helmDmg, kstate(schema.status.game, 'helmetBonus', schema.spec.helmetBonus) > 0 && random.seededInt(0, 100, s + '-helmet-crit') < kstate(schema.status.game, 'helmetBonus', schema.spec.helmetBonus) ? wpnDmg * 2 : wpnDmg,
            cel.bind(amuDmg, kstate(schema.status.game, 'amuletBonus', schema.spec.amuletBonus) > 0 ? helmDmg * (100 + kstate(schema.status.game, 'amuletBonus', schema.spec.amuletBonus)) / 100 : helmDmg,
            cel.bind(finalDmg, kstate(schema.status.game, 'stunTurns', schema.spec.stunTurns) > 0 ? 0 : amuDmg,
            cel.bind(curMonsterHP, has(schema.status.game.monsterHP) ? schema.status.game.monsterHP : (has(schema.spec.monsterHP) ? schema.spec.monsterHP : []),
            cel.bind(monsterKill, !isBoss && idx >= 0 && size(curMonsterHP) > idx && int(curMonsterHP[idx]) > 0
              && int(curMonsterHP[idx]) - finalDmg <= 0,
            cel.bind(bossKill, isBoss && kstate(schema.status.game, 'bossHP', schema.spec.bossHP) > 0
              && kstate(schema.status.game, 'bossHP', schema.spec.bossHP) - finalDmg <= 0,
            cel.bind(types8, ['weapon','armor','hppotion','manapotion','shield','helmet','pants','boots'],
            cel.bind(types7, ['weapon','armor','hppotion','shield','helmet','pants','boots'],
            cel.bind(lootItem,
              bossKill ?
                cel.bind(bRar, alpha.indexOf(random.seededString(1, name + '-boss-rar')) % 36,
                cel.bind(bRarity, bRar >= 18 ? 'epic' : 'rare',
                cel.bind(bTyp, alpha.indexOf(random.seededString(1, name + '-boss-typ')) % 7,
                  types7[bTyp] + '-' + bRarity
                )))
              : monsterKill ?
                cel.bind(mSeed, name + '-m' + string(idx),
                cel.bind(dropRoll, alpha.indexOf(random.seededString(1, mSeed + '-drop')) % 36,
                cel.bind(dropThresh, diff == 'easy' ? 22 : diff == 'hard' ? 13 : 16,
                  dropRoll < dropThresh ?
                    cel.bind(rarRoll, alpha.indexOf(random.seededString(1, mSeed + '-rar')) % 36,
                    cel.bind(mRarity, rarRoll >= 33 ? 'epic' : rarRoll >= 22 ? 'rare' : 'common',
                    cel.bind(typRoll, alpha.indexOf(random.seededString(1, mSeed + '-typ')) % 8,
                      types8[typRoll] + '-' + mRarity
                    )))
                  : ''
                )))
              : '',
              lootItem != '' ?
                cel.bind(invItems, json.unmarshal(curInventory == '' ? '[]' : curInventory),
                  size(invItems) < 8 ? json.marshal(invItems + [lootItem]) : curInventory
                )
              : curInventory
            )))))))))))))))))))))}

      includeWhen:
        - "${schema.spec.attackSeq > kstate(schema.status.game, 'combatProcessedSeq', schema.spec.combatProcessedSeq) && schema.spec.lastAttackTarget != ''}"

    # ===================================================================
    # actionResolve: handles use/equip/treasure/door scalar state mutations.
    # Backend writes: lastAction, actionSeq, lastHeroAction, lastEnemyAction
    # kro computes: inventory, heroHP, heroMana, equipment bonuses, treasure/door
    # ===================================================================
    - id: actionResolve
      state:
        storeName: game
        fields:
          # --- Inventory: remove item on use/equip ---
          inventory: >-
            ${cel.bind(a, schema.spec.lastAction,
            cel.bind(inv, kstate(schema.status.game, 'inventory', schema.spec.inventory),
              a.startsWith('use-') || a.startsWith('equip-') ?
                cel.bind(item, a.startsWith('use-') ? a.substring(4) : a.substring(6),
                  json.marshal(json.unmarshal(inv == '' ? '[]' : inv).filter(x, x != item))
                )
              : inv
            ))}

          # --- heroHP: HP potion healing ---
          heroHP: >-
            ${cel.bind(a, schema.spec.lastAction,
            cel.bind(hp, kstate(schema.status.game, 'heroHP', schema.spec.heroHP),
            cel.bind(maxHP,
              schema.spec.heroClass == 'warrior' ? 200
              : schema.spec.heroClass == 'mage' ? 120
              : schema.spec.heroClass == 'rogue' ? 150 : 100,
              a == 'use-hppotion-common' ? (hp + 20 > maxHP ? maxHP : hp + 20)
              : a == 'use-hppotion-rare' ? (hp + 40 > maxHP ? maxHP : hp + 40)
              : a == 'use-hppotion-epic' ? maxHP
              : hp
            )))}

          # --- heroMana: mana potion restore + room 2 mana refill ---
          heroMana: >-
            ${cel.bind(a, schema.spec.lastAction,
            cel.bind(mana, kstate(schema.status.game, 'heroMana', schema.spec.heroMana),
              a == 'use-manapotion-common' ? (mana + 2 > 8 ? 8 : mana + 2)
              : a == 'use-manapotion-rare' ? (mana + 3 > 8 ? 8 : mana + 3)
              : a == 'use-manapotion-epic' ? 8
              : a == 'enter-room-2' && schema.spec.heroClass == 'mage' ? 8
              : mana
            ))}

          # --- Equipment bonus fields (overwrite on equip) ---
          weaponBonus: >-
            ${cel.bind(a, schema.spec.lastAction,
              a == 'equip-weapon-common' ? 5
              : a == 'equip-weapon-rare' ? 10
              : a == 'equip-weapon-epic' ? 20
              : kstate(schema.status.game, 'weaponBonus', schema.spec.weaponBonus)
            )}
          weaponUses: >-
            ${cel.bind(a, schema.spec.lastAction,
              a == 'equip-weapon-common' || a == 'equip-weapon-rare' || a == 'equip-weapon-epic' ? 3
              : kstate(schema.status.game, 'weaponUses', schema.spec.weaponUses)
            )}
          armorBonus: >-
            ${cel.bind(a, schema.spec.lastAction,
              a == 'equip-armor-common' ? 10
              : a == 'equip-armor-rare' ? 20
              : a == 'equip-armor-epic' ? 30
              : kstate(schema.status.game, 'armorBonus', schema.spec.armorBonus)
            )}
          shieldBonus: >-
            ${cel.bind(a, schema.spec.lastAction,
              a == 'equip-shield-common' ? 10
              : a == 'equip-shield-rare' ? 15
              : a == 'equip-shield-epic' ? 25
              : kstate(schema.status.game, 'shieldBonus', schema.spec.shieldBonus)
            )}
          helmetBonus: >-
            ${cel.bind(a, schema.spec.lastAction,
              a == 'equip-helmet-common' ? 5
              : a == 'equip-helmet-rare' ? 10
              : a == 'equip-helmet-epic' ? 15
              : kstate(schema.status.game, 'helmetBonus', schema.spec.helmetBonus)
            )}
          pantsBonus: >-
            ${cel.bind(a, schema.spec.lastAction,
              a == 'equip-pants-common' ? 5
              : a == 'equip-pants-rare' ? 10
              : a == 'equip-pants-epic' ? 15
              : kstate(schema.status.game, 'pantsBonus', schema.spec.pantsBonus)
            )}
          bootsBonus: >-
            ${cel.bind(a, schema.spec.lastAction,
              a == 'equip-boots-common' ? 20
              : a == 'equip-boots-rare' ? 40
              : a == 'equip-boots-epic' ? 60
              : kstate(schema.status.game, 'bootsBonus', schema.spec.bootsBonus)
            )}
          ringBonus: >-
            ${cel.bind(a, schema.spec.lastAction,
              a == 'equip-ring-common' ? 5
              : a == 'equip-ring-rare' ? 8
              : a == 'equip-ring-epic' ? 12
              : kstate(schema.status.game, 'ringBonus', schema.spec.ringBonus)
            )}
          amuletBonus: >-
            ${cel.bind(a, schema.spec.lastAction,
              a == 'equip-amulet-common' ? 10
              : a == 'equip-amulet-rare' ? 20
              : a == 'equip-amulet-epic' ? 30
              : kstate(schema.status.game, 'amuletBonus', schema.spec.amuletBonus)
            )}

          # --- Treasure and door ---
          treasureOpened: >-
            ${cel.bind(a, schema.spec.lastAction,
              a == 'open-treasure' ? 1
              : a == 'enter-room-2' ? 0
              : kstate(schema.status.game, 'treasureOpened', schema.spec.treasureOpened)
            )}
          doorUnlocked: >-
            ${cel.bind(a, schema.spec.lastAction,
              a == 'unlock-door' ? 1
              : a == 'enter-room-2' ? 0
              : kstate(schema.status.game, 'doorUnlocked', schema.spec.doorUnlocked)
            )}

          # --- Room 2 scalar transition ---
          currentRoom: >-
            ${schema.spec.lastAction == 'enter-room-2' ? 2 : kstate(schema.status.game, 'currentRoom', schema.spec.currentRoom)}

          # --- Loot cleared on every action ---
          lastLootDrop: "${''}"

          # --- Action processed sentinel ---
          actionProcessedSeq: "${schema.spec.actionSeq}"

      includeWhen:
        - "${schema.spec.actionSeq > kstate(schema.status.game, 'actionProcessedSeq', schema.spec.actionProcessedSeq) && schema.spec.lastAction != ''}"

    # ===================================================================
    # enterRoom2Resolve: handles ONLY the array fields for room 2 transition.
    # Fires ONCE: when currentRoom reaches 2 AND room2ProcessedSeq is still 0.
    # ===================================================================
    - id: enterRoom2Resolve
      state:
        storeName: game
        fields:
          monsterHP: >-
            ${cel.bind(diff, schema.spec.difficulty,
            cel.bind(mod, kstate(schema.status.game, 'modifier', schema.spec.modifier),
              cel.bind(r1m, diff == 'easy' ? 30 : diff == 'hard' ? 80 : 50,
              cel.bind(r2m, r1m * 3 / 2,
              cel.bind(adj,
                mod.startsWith('blessing') ? r2m * 9 / 10
                : mod.startsWith('curse') ? r2m * 11 / 10
                : r2m,
                lists.range(schema.spec.monsters).map(i, adj)
              )))))}

          bossHP: >-
            ${cel.bind(diff, schema.spec.difficulty,
            cel.bind(mod, kstate(schema.status.game, 'modifier', schema.spec.modifier),
              cel.bind(r1b, diff == 'easy' ? 200 : diff == 'hard' ? 800 : 400,
              cel.bind(r2b, r1b * 13 / 10,
                mod.startsWith('blessing') ? r2b * 9 / 10
                : mod.startsWith('curse') ? r2b * 11 / 10
                : r2b
              ))))}

          room2MonsterHP: >-
            ${cel.bind(diff, schema.spec.difficulty,
            cel.bind(mod, kstate(schema.status.game, 'modifier', schema.spec.modifier),
              cel.bind(r1m, diff == 'easy' ? 30 : diff == 'hard' ? 80 : 50,
              cel.bind(r2m, r1m * 3 / 2,
              cel.bind(adj,
                mod.startsWith('blessing') ? r2m * 9 / 10
                : mod.startsWith('curse') ? r2m * 11 / 10
                : r2m,
                lists.range(schema.spec.monsters).map(i, adj)
              )))))}

          room2BossHP: >-
            ${cel.bind(diff, schema.spec.difficulty,
            cel.bind(mod, kstate(schema.status.game, 'modifier', schema.spec.modifier),
              cel.bind(r1b, diff == 'easy' ? 200 : diff == 'hard' ? 800 : 400,
              cel.bind(r2b, r1b * 13 / 10,
                mod.startsWith('blessing') ? r2b * 9 / 10
                : mod.startsWith('curse') ? r2b * 11 / 10
                : r2b
              ))))}

          monsterTypes: >-
            ${lists.range(schema.spec.monsters).map(i, i % 2 == 0 ? 'troll' : 'ghoul')}

          # --- Room 2 sentinel ---
          room2ProcessedSeq: "${schema.spec.actionSeq}"

      includeWhen:
        - "${kstate(schema.status.game, 'currentRoom', schema.spec.currentRoom) == 2 && kstate(schema.status.game, 'room2ProcessedSeq', schema.spec.room2ProcessedSeq) == 0}"
