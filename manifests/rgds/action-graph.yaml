apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: action-graph
spec:
  schema:
    apiVersion: v1alpha1
    kind: Action
    group: game.k8s.example
    spec:
      dungeonName: string | required=true
      dungeonNamespace: string | default="default"
      action: string | required=true
    status:
      jobStatus: "${actionJob.status.?succeeded.orValue(0) > 0 ? 'success' : 'pending'}"

  resources:
    - id: actionJob
      template:
        apiVersion: batch/v1
        kind: Job
        metadata:
          name: ${schema.metadata.name}
          namespace: ${schema.metadata.namespace}
        spec:
          backoffLimit: 3
          ttlSecondsAfterFinished: 30
          template:
            spec:
              serviceAccountName: attack-job-sa
              restartPolicy: Never
              containers:
                - name: actor
                  image: 569190534191.dkr.ecr.us-west-2.amazonaws.com/krombat/job-runner:latest
                  imagePullPolicy: IfNotPresent
                  command: ["bash", "-c"]
                  args:
                    - |
                      set -e
                      DUNGEON="${schema.spec.dungeonName}"
                      DUNGEON_NS="${schema.spec.dungeonNamespace}"
                      ACTION="${schema.spec.action}"

                      for i in 1 2 3 4 5; do
                        DUNGEON_JSON=$(kubectl get dungeon "$DUNGEON" -n "$DUNGEON_NS" -o json 2>&1)
                        HERO_HP=$(echo "$DUNGEON_JSON" | jq -r '.spec.heroHP // 100')
                        HERO_MANA=$(echo "$DUNGEON_JSON" | jq -r '.spec.heroMana // 0')
                        HERO_CLASS=$(echo "$DUNGEON_JSON" | jq -r '.spec.heroClass // "warrior"')
                        INVENTORY=$(echo "$DUNGEON_JSON" | jq -r '.spec.inventory // ""')
                        BACKSTAB_CD=$(echo "$DUNGEON_JSON" | jq -r '.spec.backstabCooldown // 0')
                        DIFFICULTY=$(echo "$DUNGEON_JSON" | jq -r '.spec.difficulty // "normal"')
                        if [ "$BACKSTAB_CD" -gt 0 ]; then BACKSTAB_CD=$((BACKSTAB_CD - 1)); fi

                        # === USE ITEM ===
                        if echo "$ACTION" | grep -q "^use-"; then
                          ITEM_TYPE=$(echo "$ACTION" | sed 's/^use-//')
                          if ! echo ",$INVENTORY," | grep -q ",$ITEM_TYPE,"; then
                            echo "Item $ITEM_TYPE not in inventory"; exit 1
                          fi
                          NEW_INV=$(echo "$INVENTORY" | sed "s/$ITEM_TYPE//" | sed 's/,,/,/g' | sed 's/^,//;s/,$//')
                          MANA_ADD=0
                          HEAL=0
                          case "$ITEM_TYPE" in
                            hppotion-common) HEAL=20 ;; hppotion-rare) HEAL=40 ;; hppotion-epic) HEAL=999 ;;
                            manapotion-common) MANA_ADD=2 ;; manapotion-rare) MANA_ADD=3 ;; manapotion-epic) MANA_ADD=5 ;;
                            *) echo "Unknown item $ITEM_TYPE"; exit 1 ;;
                          esac
                          MAX_HP=100
                          case "$HERO_CLASS" in warrior) MAX_HP=200 ;; mage) MAX_HP=120 ;; rogue) MAX_HP=150 ;; esac
                          if [ "$MANA_ADD" -gt 0 ]; then
                            NEW_MANA=$((HERO_MANA + MANA_ADD))
                            if [ "$NEW_MANA" -gt 5 ]; then NEW_MANA=5; fi
                            HERO_ACTION="Used $ITEM_TYPE! Mana: $HERO_MANA -> $NEW_MANA"
                            PATCH="{\"spec\":{\"heroMana\":$NEW_MANA,\"inventory\":\"$NEW_INV\",\"backstabCooldown\":$BACKSTAB_CD,\"lastHeroAction\":\"$HERO_ACTION\",\"lastEnemyAction\":\"Item used\",\"lastLootDrop\":\"\"}}"
                          else
                            NEW_HP=$((HERO_HP + HEAL))
                            if [ "$NEW_HP" -gt "$MAX_HP" ]; then NEW_HP=$MAX_HP; fi
                            HERO_ACTION="Used $ITEM_TYPE! HP: $HERO_HP -> $NEW_HP"
                            PATCH="{\"spec\":{\"heroHP\":$NEW_HP,\"inventory\":\"$NEW_INV\",\"backstabCooldown\":$BACKSTAB_CD,\"lastHeroAction\":\"$HERO_ACTION\",\"lastEnemyAction\":\"Item used\",\"lastLootDrop\":\"\"}}"
                          fi
                          echo "$HERO_ACTION"
                          if kubectl patch dungeon "$DUNGEON" -n "$DUNGEON_NS" --type=merge -p "$PATCH" 2>&1; then
                            echo "Item used!"; exit 0
                          fi
                          echo "Conflict, retrying ($i/5)..."; sleep $i; continue
                        fi

                        # === EQUIP ITEM ===
                        if echo "$ACTION" | grep -q "^equip-"; then
                          ITEM_TYPE=$(echo "$ACTION" | sed 's/^equip-//')
                          if ! echo ",$INVENTORY," | grep -q ",$ITEM_TYPE,"; then
                            echo "Item $ITEM_TYPE not in inventory"; exit 1
                          fi
                          NEW_INV=$(echo "$INVENTORY" | sed "s/$ITEM_TYPE//" | sed 's/,,/,/g' | sed 's/^,//;s/,$//')
                          IS_WEAPON=false; IS_SHIELD=false
                          WEAPON_VAL=0; WEAPON_USES_VAL=0; ARMOR_VAL=0; SHIELD_VAL=0
                          case "$ITEM_TYPE" in
                            weapon-common) WEAPON_VAL=5; WEAPON_USES_VAL=3; IS_WEAPON=true ;;
                            weapon-rare) WEAPON_VAL=10; WEAPON_USES_VAL=3; IS_WEAPON=true ;;
                            weapon-epic) WEAPON_VAL=20; WEAPON_USES_VAL=3; IS_WEAPON=true ;;
                            armor-common) ARMOR_VAL=10 ;; armor-rare) ARMOR_VAL=20 ;; armor-epic) ARMOR_VAL=30 ;;
                            shield-common) SHIELD_VAL=10; IS_SHIELD=true ;; shield-rare) SHIELD_VAL=15; IS_SHIELD=true ;; shield-epic) SHIELD_VAL=25; IS_SHIELD=true ;;
                            *) echo "Cannot equip $ITEM_TYPE"; exit 1 ;;
                          esac
                          if [ "$IS_WEAPON" = "true" ]; then
                            HERO_ACTION="Equipped $ITEM_TYPE! +$WEAPON_VAL damage for $WEAPON_USES_VAL attacks"
                            PATCH="{\"spec\":{\"weaponBonus\":$WEAPON_VAL,\"weaponUses\":$WEAPON_USES_VAL,\"inventory\":\"$NEW_INV\",\"backstabCooldown\":$BACKSTAB_CD,\"lastHeroAction\":\"$HERO_ACTION\",\"lastEnemyAction\":\"Item equipped\",\"lastLootDrop\":\"\"}}"
                          elif [ "$IS_SHIELD" = "true" ]; then
                            HERO_ACTION="Equipped $ITEM_TYPE! +$SHIELD_VAL pct block chance"
                            PATCH="{\"spec\":{\"shieldBonus\":$SHIELD_VAL,\"inventory\":\"$NEW_INV\",\"backstabCooldown\":$BACKSTAB_CD,\"lastHeroAction\":\"$HERO_ACTION\",\"lastEnemyAction\":\"Item equipped\",\"lastLootDrop\":\"\"}}"
                          else
                            HERO_ACTION="Equipped $ITEM_TYPE! +$ARMOR_VAL pct defense"
                            PATCH="{\"spec\":{\"armorBonus\":$ARMOR_VAL,\"inventory\":\"$NEW_INV\",\"backstabCooldown\":$BACKSTAB_CD,\"lastHeroAction\":\"$HERO_ACTION\",\"lastEnemyAction\":\"Item equipped\",\"lastLootDrop\":\"\"}}"
                          fi
                          echo "$HERO_ACTION"
                          if kubectl patch dungeon "$DUNGEON" -n "$DUNGEON_NS" --type=merge -p "$PATCH" 2>&1; then
                            echo "Item equipped!"; exit 0
                          fi
                          echo "Conflict, retrying ($i/5)..."; sleep $i; continue
                        fi

                        # === OPEN TREASURE ===
                        if [ "$ACTION" = "open-treasure" ]; then
                          BOSS_HP_CHK=$(echo "$DUNGEON_JSON" | jq -r '.spec.bossHP // 1')
                          ALIVE_CHK=$(echo "$DUNGEON_JSON" | jq '[.spec.monsterHP[] | select(. > 0)] | length')
                          if [ "$BOSS_HP_CHK" -gt 0 ] || [ "$ALIVE_CHK" -gt 0 ]; then
                            echo "Cannot open treasure: boss not defeated"; exit 1
                          fi
                          PATCH="{\"spec\":{\"treasureOpened\":1,\"lastHeroAction\":\"Opened the treasure chest!\",\"lastEnemyAction\":\"\",\"lastLootDrop\":\"\"}}"
                          if kubectl patch dungeon "$DUNGEON" -n "$DUNGEON_NS" --type=merge -p "$PATCH" 2>&1; then
                            echo "Treasure opened!"; exit 0
                          fi
                          echo "Conflict, retrying ($i/5)..."; sleep $i; continue
                        fi

                        # === UNLOCK DOOR ===
                        if [ "$ACTION" = "unlock-door" ]; then
                          TREASURE_OPENED=$(echo "$DUNGEON_JSON" | jq -r '.spec.treasureOpened // 0')
                          if [ "$TREASURE_OPENED" -ne 1 ]; then
                            echo "Open the treasure first to get the key"; exit 1
                          fi
                          PATCH="{\"spec\":{\"doorUnlocked\":1,\"lastHeroAction\":\"Door unlocked! A new room awaits...\",\"lastEnemyAction\":\"\",\"lastLootDrop\":\"\"}}"
                          if kubectl patch dungeon "$DUNGEON" -n "$DUNGEON_NS" --type=merge -p "$PATCH" 2>&1; then
                            echo "Door unlocked!"; exit 0
                          fi
                          echo "Conflict, retrying ($i/5)..."; sleep $i; continue
                        fi

                        # === ENTER ROOM 2 ===
                        if [ "$ACTION" = "enter-room-2" ]; then
                          DOOR_UNLOCKED=$(echo "$DUNGEON_JSON" | jq -r '.spec.doorUnlocked // 0')
                          if [ "$DOOR_UNLOCKED" -ne 1 ]; then
                            echo "Unlock the door first"; exit 1
                          fi
                          case "$DIFFICULTY" in
                            easy)   R2_MHP=50; R2_BHP=400 ;;
                            hard)   R2_MHP=120; R2_BHP=1200 ;;
                            *)      R2_MHP=80; R2_BHP=800 ;;
                          esac
                          MONSTER_COUNT=$(echo "$DUNGEON_JSON" | jq '.spec.monsterHP | length')
                          R2_ARRAY=$(echo "$DUNGEON_JSON" | jq "[range($MONSTER_COUNT)] | map($R2_MHP)")
                          PATCH="{\"spec\":{\"currentRoom\":2,\"monsterHP\":$R2_ARRAY,\"bossHP\":$R2_BHP,\"room2MonsterHP\":$R2_ARRAY,\"room2BossHP\":$R2_BHP,\"treasureOpened\":0,\"doorUnlocked\":0,\"lastHeroAction\":\"Entered Room 2! Stronger enemies await...\",\"lastEnemyAction\":\"\",\"lastLootDrop\":\"\"}}"
                          if kubectl patch dungeon "$DUNGEON" -n "$DUNGEON_NS" --type=merge -p "$PATCH" 2>&1; then
                            # Clean up stale attack/action CRs from room 1
                            for atk in $(kubectl get attacks --no-headers -o custom-columns=NAME:.metadata.name 2>/dev/null | grep "^$DUNGEON-" || true); do
                              kubectl delete attack "$atk" --wait=false 2>/dev/null || true
                            done
                            echo "Entered Room 2!"; exit 0
                          fi
                          echo "Conflict, retrying ($i/5)..."; sleep $i; continue
                        fi

                        echo "Unknown action: $ACTION"; exit 1
                      done
                      echo "Failed after 5 retries"; exit 1
