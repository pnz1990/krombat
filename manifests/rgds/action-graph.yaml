apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: action-graph
spec:
  schema:
    apiVersion: v1alpha1
    kind: Action
    group: game.k8s.example
    spec:
      dungeonName: string | required=true
      dungeonNamespace: string | default="default"
      action: string | required=true
      actionSeq: integer | default=0
  # No resources — this RGD exists only to define the Action CRD.
  # Action logic is computed by dungeon-graph CEL reading the Action CR
  # via externalRef. The backend Go controller applies the result to
  # the Dungeon CR spec. No Job, no bash, no kubectl from within the cluster.
  resources: []
