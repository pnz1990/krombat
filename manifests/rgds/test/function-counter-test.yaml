apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: function-counter-test
spec:
  schema:
    apiVersion: v1alpha1
    kind: FunctionCounter
    spec:
      counter: "integer | default=0"
      label: "string | default=hello"
    status:
      lastLabel: "${counterCm.data.label}"
  resources:
    # A ConfigMap that reflects the current counter value (regular resource node)
    - id: counterCm
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${schema.metadata.name}-counter"
        data:
          counter: "${string(schema.spec.counter)}"
          label: "${schema.spec.label}"

    # function node: calls external HTTP server to increment spec.counter
    # includeWhen gates the call so it stops once counter reaches 5
    - id: incrementCounter
      type: function
      includeWhen:
        - "${schema.spec.counter < 5}"
      endpoint: "http://function-server.rpg-system.svc:8080/increment"
