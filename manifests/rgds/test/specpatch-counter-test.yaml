apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: specpatch-counter-test
spec:
  schema:
    apiVersion: v1alpha1
    kind: CounterTest
    spec:
      counter: "integer | default=0"
      label: "string | default=hello"
    status:
      counterDoubled: "${counterCm.data.counter}"
  resources:
    # A ConfigMap that reflects the current counter value (regular resource node)
    - id: counterCm
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${schema.metadata.name}-counter"
        data:
          counter: "${string(schema.spec.counter)}"

    # specPatch node: increment counter by 1 each reconcile
    # includeWhen prevents runaway loop: only patch when counter < 5
    - id: incrementCounter
      type: specPatch
      includeWhen:
        - "${schema.spec.counter < 5}"
      patch:
        counter: "${schema.spec.counter + 1}"
