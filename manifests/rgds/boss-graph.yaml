apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: boss-graph
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  schema:
    apiVersion: v1alpha1
    kind: Boss
    group: game.k8s.example
    spec:
      dungeonName: string | required=true
      hp: integer | required=true
      maxHP: integer | default=400
      difficulty: string | default="normal"
      monstersAlive: integer | default=1
    status:
      entityState: "${bossState.data.entityState}"
      hp: "${bossState.data.hp}"
      phase: "${bossState.data.phase}"
      damageMultiplier: "${bossState.data.damageMultiplier}"
      specialAttackChance: "${bossState.data.specialAttackChance}"

  resources:
    - id: bossState
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: "${schema.spec.dungeonName + '-boss'}"
          namespace: ${schema.metadata.namespace}
          labels:
            game.k8s.example/dungeon: ${schema.spec.dungeonName}
            game.k8s.example/entity: boss
            game.k8s.example/state: "${schema.spec.hp > 0 ? (schema.spec.monstersAlive == 0 ? 'ready' : 'pending') : 'defeated'}"
            game.k8s.example/phase: >-
              ${
                schema.spec.hp <= 0 ? 'defeated' :
                schema.spec.hp * 100 / (schema.spec.maxHP > 0 ? schema.spec.maxHP : 400) > 50 ? 'phase1' :
                schema.spec.hp * 100 / (schema.spec.maxHP > 0 ? schema.spec.maxHP : 400) > 25 ? 'phase2' :
                'phase3'
              }
        data:
          entityState: "${schema.spec.hp > 0 ? (schema.spec.monstersAlive == 0 ? 'ready' : 'pending') : 'defeated'}"
          hp: "${string(schema.spec.hp)}"
          # Phase derived from HP % of maxHP:
          #   Phase 1: >50% HP  (100-51%)
          #   Phase 2: >25% HP  (50-26%)
          #   Phase 3: >0% HP   (25-1%)
          #   Phase defeated:   HP == 0
          phase: >-
            ${
              schema.spec.hp <= 0 ? 'defeated' :
              schema.spec.hp * 100 / (schema.spec.maxHP > 0 ? schema.spec.maxHP : 400) > 50 ? 'phase1' :
              schema.spec.hp * 100 / (schema.spec.maxHP > 0 ? schema.spec.maxHP : 400) > 25 ? 'phase2' :
              'phase3'
            }
          # Damage multiplier per phase: 1.0x / 1.5x / 2.0x (stored as integer *10)
          damageMultiplier: >-
            ${
              schema.spec.hp <= 0 ? '10' :
              schema.spec.hp * 100 / (schema.spec.maxHP > 0 ? schema.spec.maxHP : 400) > 50 ? '10' :
              schema.spec.hp * 100 / (schema.spec.maxHP > 0 ? schema.spec.maxHP : 400) > 25 ? '15' :
              '20'
            }
          # Special attack chance per phase: 20% / 40% / 60%
          specialAttackChance: >-
            ${
              schema.spec.hp <= 0 ? '0' :
              schema.spec.hp * 100 / (schema.spec.maxHP > 0 ? schema.spec.maxHP : 400) > 50 ? '20' :
              schema.spec.hp * 100 / (schema.spec.maxHP > 0 ? schema.spec.maxHP : 400) > 25 ? '40' :
              '60'
            }

    # Loot CR — boss always drops on kill (hp == 0), always rare or epic
    #
    # DEDUPLICATION NOTE (issue #126):
    # CEL has no let-bindings so indexOf must be re-evaluated each time it is used.
    # The stat field uses a flat 1D lookup table indexed by (typeIdx * 2 + rarityBucket)
    # instead of a cascading ternary that re-evaluated indexOf 9 times.
    #
    # Seeds:  -boss-typ → typeIdx = indexOf % 7   (item type)
    #         -boss-rar → rarIdx  = indexOf % 36  (rarity bucket: <18→0 rare, else 1 epic)
    #
    # Stat table (typeIdx * 2 + rarityBucket):
    #   [weapon: 10,20]  [armor: 20,30]  [hppotion: 40,999]  [shield: 15,25]
    #   [helmet: 10,15]  [pants: 10,15]  [boots: 40,60]
    - id: lootCR
      includeWhen:
        - ${schema.spec.hp == 0}
      template:
        apiVersion: game.k8s.example/v1alpha1
        kind: Loot
        metadata:
          name: "${schema.spec.dungeonName + '-boss-loot'}"
          namespace: ${schema.metadata.namespace}
          labels:
            game.k8s.example/dungeon: ${schema.spec.dungeonName}
            game.k8s.example/entity: loot
            game.k8s.example/source: boss
        spec:
          dungeonName: ${schema.spec.dungeonName}
          # Boss always drops (dropped=true)
          dropped: true
          # Rarity: 50% rare, 50% epic (alphabet index 0-35, <18 = rare)
          rarity: >-
            ${
              int('abcdefghijklmnopqrstuvwxyz0123456789'.indexOf(
                random.seededString(1, schema.spec.dungeonName + '-boss-rar')
              ) % 36) < 18 ? 'rare' : 'epic'
            }
          # Type: weapon/armor/hppotion/shield/helmet/pants/boots (7 types, no manapotion for boss)
          itemType: >-
            ${
              ['weapon','armor','hppotion','shield','helmet','pants','boots'][
                int('abcdefghijklmnopqrstuvwxyz0123456789'.indexOf(
                  random.seededString(1, schema.spec.dungeonName + '-boss-typ')
                ) % 7)
              ]
            }
          # Stat based on itemType and rarity — flat lookup table [typeIdx * 2 + rarityBucket]
          stat: >-
            ${
              [10,20, 20,30, 40,999, 15,25, 10,15, 10,15, 40,60][
                int('abcdefghijklmnopqrstuvwxyz0123456789'.indexOf(
                  random.seededString(1, schema.spec.dungeonName + '-boss-typ')
                ) % 7) * 2 + (
                  int('abcdefghijklmnopqrstuvwxyz0123456789'.indexOf(
                    random.seededString(1, schema.spec.dungeonName + '-boss-rar')
                  ) % 36) < 18 ? 0 : 1
                )
              ]
            }
