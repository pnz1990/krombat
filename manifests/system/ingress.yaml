apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: krombat
  namespace: rpg-system
  annotations:
    kubernetes.io/ingress.class: alb
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP":80},{"HTTPS":443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: "arn:aws:acm:us-west-2:319279230668:certificate/fcaf3070-54fb-4ac1-bc76-4f57caf00221"
    external-dns.alpha.kubernetes.io/hostname: "learn-kro.eks.aws.dev"
    alb.ingress.kubernetes.io/load-balancer-attributes: idle_timeout.timeout_seconds=300
spec:
  rules:
    - host: learn-kro.eks.aws.dev
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rpg-backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: rpg-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rpg-frontend
                port:
                  number: 3000
