---
# IngressClassParams: ALB configuration (EKS Auto Mode uses eks.amazonaws.com/v1)
apiVersion: eks.amazonaws.com/v1
kind: IngressClassParams
metadata:
  name: krombat
spec:
  scheme: internal
  certificateARNs:
    - arn:aws:acm:us-west-2:319279230668:certificate/fcaf3070-54fb-4ac1-bc76-4f57caf00221
  loadBalancerAttributes:
    - key: idle_timeout.timeout_seconds
      value: "300"
---
# IngressClass: wires EKS Auto Mode controller to the above params
apiVersion: networking.k8s.io/v1
kind: IngressClass
metadata:
  name: krombat
spec:
  controller: eks.amazonaws.com/alb
  parameters:
    apiGroup: eks.amazonaws.com
    kind: IngressClassParams
    name: krombat
---
# Ingress: path-based routing + external-dns hostname annotation
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: krombat
  namespace: rpg-system
  annotations:
    external-dns.alpha.kubernetes.io/hostname: "learn-kro.eks.aws.dev"
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/target-type: ip
spec:
  ingressClassName: krombat
  rules:
    - host: learn-kro.eks.aws.dev
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: rpg-backend
                port:
                  number: 8080
          - path: /ws
            pathType: Prefix
            backend:
              service:
                name: rpg-backend
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: rpg-frontend
                port:
                  number: 3000
