apiVersion: apps/v1
kind: Deployment
metadata:
  name: rpg-backend
  namespace: rpg-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rpg-backend
  template:
    metadata:
      labels:
        app: rpg-backend
    spec:
      serviceAccountName: rpg-backend-sa
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: rpg-backend
      containers:
        - name: backend
          image: 319279230668.dkr.ecr.us-west-2.amazonaws.com/krombat/backend:5a0b6d54e1deeb81f2882a68cc2bcfb4c0d82d10
          ports:
            - containerPort: 8080
          env:
            - name: GITHUB_CALLBACK_URL
              value: "https://learn-kro.eks.aws.dev/api/v1/auth/callback"
            - name: ALLOWED_ORIGINS
              value: "https://learn-kro.eks.aws.dev"
            - name: MAX_DUNGEONS_PER_USER
              value: "50"
          envFrom:
            - secretRef:
                name: krombat-github-oauth
                optional: true   # pod still starts without the secret; OAuth simply returns 503
            - secretRef:
                name: krombat-test-auth
                optional: true   # pod still starts without the secret; test bypass disabled if absent
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rpg-backend
  namespace: rpg-system
spec:
  selector:
    app: rpg-backend
  ports:
    - port: 8080
      targetPort: 8080
