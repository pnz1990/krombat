apiVersion: apps/v1
kind: Deployment
metadata:
  name: rpg-frontend
  namespace: rpg-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rpg-frontend
  template:
    metadata:
      labels:
        app: rpg-frontend
    spec:
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app: rpg-frontend
      containers:
        - name: frontend
          image: 319279230668.dkr.ecr.us-west-2.amazonaws.com/krombat/frontend:5a0b6d54e1deeb81f2882a68cc2bcfb4c0d82d10
          ports:
            - containerPort: 3000
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: rpg-frontend
  namespace: rpg-system
spec:
  selector:
    app: rpg-frontend
  ports:
    - port: 3000
      targetPort: 3000
