apiVersion: apps/v1
kind: Deployment
metadata:
  name: rpg-frontend
  namespace: rpg-system
spec:
  replicas: 3
  selector:
    matchLabels:
      app: rpg-frontend
  template:
    metadata:
      labels:
        app: rpg-frontend
    spec:
      topologySpreadConstraints:
        # #471: enforce AZ spread — frontend pods must not stack on same zone
        - maxSkew: 1
          topologyKey: topology.kubernetes.io/zone
          whenUnsatisfiable: DoNotSchedule
          labelSelector:
            matchLabels:
              app: rpg-frontend
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: frontend
          # #415: nginxinc/nginx-unprivileged runs as UID 101 (non-root).
          # Listens on port 8080 instead of privileged 80.
          image: 319279230668.dkr.ecr.us-west-2.amazonaws.com/krombat/frontend:76edc911ea78f50e0ac8f423cdf44753832f0fe7
          ports:
            - containerPort: 3000
          securityContext:
            runAsNonRoot: true
            runAsUser: 101
            runAsGroup: 101
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: nginx-cache
              mountPath: /var/cache/nginx
            - name: nginx-run
              mountPath: /var/run
            - name: nginx-tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 15
            failureThreshold: 3
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
      volumes:
        - name: nginx-cache
          emptyDir: {}
        - name: nginx-run
          emptyDir: {}
        - name: nginx-tmp
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: rpg-frontend
  namespace: rpg-system
spec:
  selector:
    app: rpg-frontend
  ports:
    - port: 3000
      targetPort: 3000
