apiVersion: v1
kind: ServiceAccount
metadata:
  name: dungeon-reaper
  namespace: rpg-system
---
# #427: namespaced Role instead of ClusterRole — reaper only needs access to
# the default namespace where dungeons live. Reduces blast radius if compromised.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dungeon-reaper
  namespace: default
rules:
  - apiGroups: [game.k8s.example]
    resources: [dungeons, attacks, actions]
    verbs: [get, list, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dungeon-reaper
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dungeon-reaper
subjects:
  - kind: ServiceAccount
    name: dungeon-reaper
    namespace: rpg-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dungeon-reaper
  namespace: rpg-system
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          serviceAccountName: dungeon-reaper
          restartPolicy: Never
          # #415: run as non-root
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reaper
              # #413: pinned to digest to prevent supply-chain attacks via mutable tag.
              # alpine/k8s:1.31.4 multi-arch digest (verified 2026-03-15).
              image: alpine/k8s:1.31.4@sha256:9c4976d47656d78cf53a92b0203fc54ac45eae18a2b45001ac221c27da4c8036
              # #415: drop all capabilities, non-root, read-only filesystem
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  MAX_AGE_HOURS=${MAX_AGE_HOURS:-4}
                  MAX_AGE_SECONDS=$((MAX_AGE_HOURS * 3600))
                  NOW=$(date +%s)

                  echo "Reaping dungeons older than ${MAX_AGE_HOURS}h..."

                  # #427: role is now namespaced to default only — use -n default
                  kubectl get dungeons -n default -o json | jq -r '
                    .items[] |
                    "default/\(.metadata.name) \(.metadata.creationTimestamp)"
                  ' | while read -r DUNGEON TS; do
                    CREATED=$(date -d "$TS" +%s 2>/dev/null || date -jf "%Y-%m-%dT%H:%M:%SZ" "$TS" +%s 2>/dev/null || echo 0)
                    AGE=$((NOW - CREATED))
                    if [ "$AGE" -gt "$MAX_AGE_SECONDS" ]; then
                      NS=$(echo "$DUNGEON" | cut -d/ -f1)
                      NAME=$(echo "$DUNGEON" | cut -d/ -f2)

                      # Active-game guard: skip dungeon if it has any running Attack or Action CRs
                      ACTIVE_ATTACKS=$(kubectl get attacks -n "$NS" -o json 2>/dev/null | jq '[.items[] | select(.status.phase != "Completed" and .status.phase != "Failed")] | length' 2>/dev/null || echo 0)
                      ACTIVE_ACTIONS=$(kubectl get actions -n "$NS" -o json 2>/dev/null | jq '[.items[] | select(.status.phase != "Completed" and .status.phase != "Failed")] | length' 2>/dev/null || echo 0)
                      ACTIVE_TOTAL=$((ACTIVE_ATTACKS + ACTIVE_ACTIONS))

                      if [ "$ACTIVE_TOTAL" -gt 0 ]; then
                        echo "Skipping dungeon $NAME (namespace $NS) — $ACTIVE_TOTAL active CR(s) in progress"
                        continue
                      fi

                      echo "Deleting dungeon $NAME (namespace $NS, age: $((AGE/3600))h)"
                      kubectl delete dungeon "$NAME" -n "$NS" --wait=false || true
                    fi
                  done

                  echo "Reaper complete."
              env:
                - name: MAX_AGE_HOURS
                  value: "4"
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
