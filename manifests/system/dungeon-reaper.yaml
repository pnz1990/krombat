apiVersion: v1
kind: ServiceAccount
metadata:
  name: dungeon-reaper
  namespace: rpg-system
---
# #427: namespaced Role instead of ClusterRole — reaper only needs access to
# the default namespace where dungeons live. Reduces blast radius if compromised.
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: dungeon-reaper
  namespace: default
rules:
  - apiGroups: [game.k8s.example]
    resources: [dungeons, attacks, actions]
    verbs: [get, list, delete]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: dungeon-reaper
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: dungeon-reaper
subjects:
  - kind: ServiceAccount
    name: dungeon-reaper
    namespace: rpg-system
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: dungeon-reaper
  namespace: rpg-system
spec:
  schedule: "*/10 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 600
      template:
        spec:
          serviceAccountName: dungeon-reaper
          restartPolicy: Never
          # #415: run as non-root
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          containers:
            - name: reaper
              # #413: pinned to digest to prevent supply-chain attacks via mutable tag.
              # alpine/k8s:1.31.4 multi-arch digest (verified 2026-03-15).
              image: alpine/k8s:1.31.4@sha256:9c4976d47656d78cf53a92b0203fc54ac45eae18a2b45001ac221c27da4c8036
              # #415: drop all capabilities, non-root, read-only filesystem
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop: ["ALL"]
              command: ["/bin/bash", "-c"]
              args:
                - |
                  set -e
                  NOW=$(date +%s)

                  # #477: retention policy
                  #   test user (c766300f… hash) and no-label dungeons: reap after 4h
                  #   real user dungeons (GitHub login):                 reap after 30 days
                  TEST_MAX_AGE=$((4 * 3600))
                  USER_MAX_AGE=$((30 * 24 * 3600))
                  # Attack/Action CRs older than this are never in-flight
                  CR_STALE_AGE=$((1 * 3600))

                  TEST_USER="c766300fc60d01939efde4f12dccd01170d792aaa9c0ef4df7d48d7ed9128e"

                  # NOTE: alpine's `date` does not support ISO 8601 with -d.
                  # All age calculations use jq's `fromdate` which handles the
                  # "2006-01-02T15:04:05Z" format correctly.

                  # ── Step 1: collect live dungeon names ──────────────────────────────────
                  LIVE_DUNGEONS=$(kubectl get dungeons -n default -o jsonpath='{.items[*].metadata.name}' 2>/dev/null || true)

                  # ── Step 2: clean up orphaned/stale Attack CRs ───────────────────────
                  echo "Cleaning orphaned/stale Attack CRs..."
                  kubectl get attacks -n default -o json 2>/dev/null | jq -r \
                    --argjson now "$NOW" \
                    --argjson stale "$CR_STALE_AGE" '
                    .items[] |
                    (.metadata.creationTimestamp | fromdate) as $created |
                    ($now - $created) as $age |
                    [.metadata.name, ($age | tostring)] | @tsv
                  ' | while IFS=$'\t' read -r CR_NAME CR_AGE; do
                    DUNGEON_NAME="${CR_NAME%-latest-attack}"
                    IS_LIVE=$(echo " $LIVE_DUNGEONS " | grep -q " $DUNGEON_NAME " && echo yes || echo no)
                    if [ "$IS_LIVE" = "no" ]; then
                      echo "  Deleting orphaned Attack CR $CR_NAME (dungeon gone)"
                      kubectl delete attack "$CR_NAME" -n default --wait=false 2>/dev/null || true
                    elif [ "$CR_AGE" -gt "$CR_STALE_AGE" ]; then
                      echo "  Deleting stale Attack CR $CR_NAME (age: $((CR_AGE/60))m, dungeon alive)"
                      kubectl delete attack "$CR_NAME" -n default --wait=false 2>/dev/null || true
                    fi
                  done

                  # ── Step 3: clean up orphaned/stale Action CRs ───────────────────────
                  echo "Cleaning orphaned/stale Action CRs..."
                  kubectl get actions -n default -o json 2>/dev/null | jq -r \
                    --argjson now "$NOW" \
                    --argjson stale "$CR_STALE_AGE" '
                    .items[] |
                    (.metadata.creationTimestamp | fromdate) as $created |
                    ($now - $created) as $age |
                    [.metadata.name, ($age | tostring)] | @tsv
                  ' | while IFS=$'\t' read -r CR_NAME CR_AGE; do
                    DUNGEON_NAME="${CR_NAME%-latest-action}"
                    IS_LIVE=$(echo " $LIVE_DUNGEONS " | grep -q " $DUNGEON_NAME " && echo yes || echo no)
                    if [ "$IS_LIVE" = "no" ]; then
                      echo "  Deleting orphaned Action CR $CR_NAME (dungeon gone)"
                      kubectl delete action "$CR_NAME" -n default --wait=false 2>/dev/null || true
                    elif [ "$CR_AGE" -gt "$CR_STALE_AGE" ]; then
                      echo "  Deleting stale Action CR $CR_NAME (age: $((CR_AGE/60))m, dungeon alive)"
                      kubectl delete action "$CR_NAME" -n default --wait=false 2>/dev/null || true
                    fi
                  done

                  # ── Step 4: reap expired dungeons ────────────────────────────────────
                  echo "Reaping dungeons (test: 4h, user: 30d)..."

                  kubectl get dungeons -n default -o json | jq -r \
                    --argjson now "$NOW" '
                    .items[] |
                    (.metadata.creationTimestamp | fromdate) as $created |
                    ($now - $created) as $age |
                    [
                      .metadata.name,
                      ($age | tostring),
                      (.metadata.labels["krombat.io/owner"] // "")
                    ] | @tsv
                  ' | while IFS=$'\t' read -r NAME AGE OWNER; do

                    # Determine max age by owner (#477)
                    # Test user hash and no-label/test-infra dungeons: 4h
                    # Real GitHub logins: 30d
                    if [ -z "$OWNER" ] || [ "$OWNER" = "test-infra" ] || [ "$OWNER" = "$TEST_USER" ]; then
                      MAX_AGE=$TEST_MAX_AGE
                      POLICY="test (4h)"
                    else
                      MAX_AGE=$USER_MAX_AGE
                      POLICY="user (30d)"
                    fi

                    if [ "$AGE" -gt "$MAX_AGE" ]; then
                      # Active-game guard: check if a same-named Attack or Action CR
                      # was created in the last 90s (backend writes these on every
                      # combat/action). Use jq fromdate — no shell date parsing.
                      IN_FLIGHT=0
                      for SUFFIX in latest-attack latest-action; do
                        CR_TS=$(kubectl get "${SUFFIX%%-*}" "${NAME}-${SUFFIX}" -n default \
                          -o jsonpath='{.metadata.creationTimestamp}' 2>/dev/null || echo "")
                        if [ -n "$CR_TS" ]; then
                          CR_AGE=$(echo "\"$CR_TS\"" | jq --argjson now "$NOW" 'fromdate | ($now - .) | floor')
                          if [ "$CR_AGE" -lt 90 ]; then
                            IN_FLIGHT=1
                          fi
                        fi
                      done

                      if [ "$IN_FLIGHT" = "1" ]; then
                        echo "Skipping dungeon $NAME — combat/action in-flight (<90s ago)"
                        continue
                      fi

                      echo "Deleting dungeon $NAME (age: $((AGE/3600))h, policy: $POLICY)"
                      kubectl delete dungeon "$NAME" -n default --wait=false || true
                    fi
                  done

                  echo "Reaper complete."
              resources:
                requests:
                  memory: "64Mi"
                  cpu: "50m"
                limits:
                  memory: "128Mi"
                  cpu: "100m"
